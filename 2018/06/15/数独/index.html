pan><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">&lt;iostream&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">&lt;time.h&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> <span class="built_in">std</span>;</span><br><span class="line"></span><br><span class="line"><span class="keyword">int</span> S[<span class="number">9</span>][<span class="number">9</span>];</span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">Check</span><span class="params">(<span class="keyword">int</span> Sum)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">int</span> row=Sum/<span class="number">9</span>,col=Sum%<span class="number">9</span>;</span><br><span class="line">    <span class="keyword">int</span> row2=row/<span class="number">3</span>*<span class="number">3</span>;</span><br><span class="line">    <span class="keyword">int</span> col2=col/<span class="number">3</span>*<span class="number">3</span>;</span><br><span class="line">    <span class="keyword">int</span> i=<span class="number">0</span>,j=<span class="number">0</span>,m=<span class="number">0</span>,n=<span class="number">0</span>;</span><br><span class="line">    </span><br><span class="line">    <span class="keyword">for</span>(i=<span class="number">0</span>;i&lt;<span class="number">9</span>;i++)<span class="comment">//行检查</span></span><br><span class="line">        <span class="keyword">if</span>(S[row][i]==S[row][col] &amp;&amp; col!=i)</span><br><span class="line">            <span class="keyword">return</span> <span class="number">1</span>;</span><br><span class="line">    <span class="keyword">for</span>(j=<span class="number">0</span>;j&lt;<span class="number">9</span>;j++)<span class="comment">//检查列</span></span><br><span class="line">        <span class="keyword">if</span>(S[j][col]==S[row][col] &amp;&amp; row!=j)</span><br><span class="line">            <span class="keyword">return</span> <span class="number">1</span>;</span><br><span class="line">    <span class="keyword">for</span>(m=row2;m&lt;row2+<span class="number">3</span>;m++)<span class="comment">//检查所在的九宫格</span></span><br><span class="line">    &#123;</span><br><span class="line">        <span class="keyword">for</span>(n=col2;n&lt;col2+<span class="number">3</span>;n++)</span><br><span class="line">            <span class="keyword">if</span>(S[row][col]==S[m][n]&amp;&amp;row!=m&amp;&amp;col!=m) <span class="keyword">return</span> <span class="number">1</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">SD</span><span class="params">(<span class="keyword">int</span> Sum)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">int</span> row=Sum/<span class="number">9</span>,col=Sum%<span class="number">9</span>;</span><br><span class="line">    <span class="keyword">int</span> flag=<span class="number">0</span>;</span><br><span class="line">    <span class="keyword">if</span>(Sum&gt;<span class="number">80</span>)</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="built_in">printf</span>(<span class="string">"\\nanswer:\\n"</span>);</span><br><span class="line">        <span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">0</span>;i&lt;<span class="number">9</span>;i++)</span><br><span class="line">        &#123;</span><br><span class="line">            </span><br><span class="line">            <span class="keyword">for</span>(<span class="keyword">int</span> j=<span class="number">0</span>;j&lt;<span class="number">9</span>;j++)</span><br><span class="line">                <span class="built_in">printf</span>(<span class="string">"%d "</span>,S[i][j]);</span><br><span class="line">            <span class="built_in">printf</span>(<span class="string">"\\n"</span>);</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> <span class="number">1</span>;</span><br><span class="line">    &#125;</span><br><span class="line">   </span><br><span class="line">    <span class="keyword">if</span>(S[row][col]==<span class="number">0</span>)  <span class="comment">//没有数字</span></span><br><span class="line">    &#123;</span><br><span class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> i=<span class="number">1</span>; i&lt;<span class="number">10</span>; i++)    <span class="comment">//暴力</span></span><br><span class="line">        &#123;</span><br><span class="line">            S[row][col]=i;</span><br><span class="line">            <span class="keyword">if</span>(!Check(Sum))</span><br><span class="line">            &#123;</span><br><span class="line">                flag=<span class="built_in">SD</span>(Sum+<span class="number">1</span>);     <span class="comment">//满足三个条件就递归下一格</span></span><br><span class="line">                <span class="keyword">if</span> (flag) <span class="keyword">return</span> <span class="number">1</span>;     <span class="comment">//递归返回</span></span><br><span class="line"></span><br><span class="line">            &#125;</span><br><span class="line">            S[row][col]=<span class="number">0</span>;      <span class="comment">//注意：回溯后面的数据是要变为零的</span></span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">else</span>        <span class="comment">//有数字</span></span><br><span class="line">    &#123;</span><br><span class="line">        flag=<span class="built_in">SD</span>(Sum+<span class="number">1</span>);         <span class="comment">//</span></span><br><span class="line">        <span class="keyword">if</span> (flag) <span class="keyword">return</span> <span class="number">1</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">clock_t</span> Star,End;</span><br><span class="line">    Star=clock();</span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">"请输入题目，空白用0代替:\\n"</span>);</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">0</span>;i&lt;<span class="number">9</span>;i++)</span><br><span class="line">        <span class="keyword">for</span>(<span class="keyword">int</span> j=<span class="number">0</span>;j&lt;<span class="number">9</span>;j++)</span><br><span class="line">            <span class="built_in">scanf</span>(<span class="string">"%d"</span>,&amp;S[i][j]);</span><br><span class="line">    <span class="built_in">SD</span>(<span class="number">0</span>);</span><br><span class="line">    End=clock();</span><br><span class="line">    <span class="keyword">double</span> Time=(<span class="keyword">double</span>)(End-Star)/CLOCKS_PER_SEC;</span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">"用时:%f秒\\n"</span>,Time);</span><br><span class="line">    </span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
