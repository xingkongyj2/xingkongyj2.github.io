    <figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">    快速幂算法:</span></span><br><span class="line"><span class="comment">            1，当b为偶数时，a^b可以转为a^2的b/2次方。</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">            2，当b为奇数时，a^b可以转为a^2的b/2次方，再乘以a。</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">            而a^2的b/2次方，以可以使用上述方式转为a^4的b/4次方再乘以某个数</span></span><br><span class="line"><span class="comment">    </span></span><br><span class="line"><span class="comment">    快速幂对某个数取余：</span></span><br><span class="line"><span class="comment">            a*b%m=(a%m)*(b%m)%m</span></span><br><span class="line"><span class="comment">            a^b%c=(a%c)^b;</span></span><br><span class="line"><span class="comment">            </span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="meta"># <span class="meta-keyword">include</span> <span class="meta-string">&lt;stdio.h&gt;</span></span></span><br><span class="line"><span class="meta"># <span class="meta-keyword">include</span> <span class="meta-string">&lt;time.h&gt;</span></span></span><br><span class="line"> </span><br><span class="line"><span class="function"><span class="keyword">long</span> <span class="keyword">long</span> <span class="title">Pow</span><span class="params">(<span class="keyword">long</span> <span class="keyword">long</span> a,<span class="keyword">long</span> <span class="keyword">long</span> b)</span>    <span class="comment">//迭代版</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">long</span> <span class="keyword">long</span> Sum=<span class="number">1</span>;</span><br><span class="line">    <span class="keyword">while</span>(b&gt;<span class="number">0</span>)</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="keyword">if</span>(b%<span class="number">2</span>)</span><br><span class="line">        &#123; </span><br><span class="line">            a=a%<span class="number">1000</span>;</span><br><span class="line">            Sum=Sum%<span class="number">1000</span>;</span><br><span class="line">            Sum=Sum*a%<span class="number">1000</span>;</span><br><span class="line">        &#125;</span><br><span class="line">        a=a%<span class="number">1000</span>;</span><br><span class="line">        a=a*a;</span><br><span class="line">        b=b&gt;&gt;<span class="number">1</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> Sum%<span class="number">1000</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">long</span> <span class="keyword">long</span> <span class="title">pow_mod</span><span class="params">(<span class="keyword">long</span> <span class="keyword">long</span> a,<span class="keyword">long</span> <span class="keyword">long</span> i,<span class="keyword">long</span> <span class="keyword">long</span> n)</span>  <span class="comment">//递归版</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>(i==<span class="number">0</span>) <span class="keyword">return</span> <span class="number">1</span>%n;</span><br><span class="line">    <span class="keyword">int</span> temp=pow_mod(a,i&gt;&gt;<span class="number">1</span>,n);    <span class="comment">//每次返回来的都是对指数折半并对其取余的结果</span></span><br><span class="line">        temp=temp*temp%n;         </span><br><span class="line">    <span class="keyword">if</span>(i&amp;<span class="number">1</span>) temp=(<span class="keyword">long</span> <span class="keyword">long</span>)temp*a%n;</span><br><span class="line">    <span class="keyword">return</span> temp;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span>  </span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">double</span>  start, finish;</span><br><span class="line">    <span class="keyword">long</span> <span class="keyword">long</span> a=<span class="number">100</span>,x=<span class="number">100</span>;</span><br><span class="line">    start = clock();</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">"%lld\n"</span>, Pow(<span class="number">5576</span>,<span class="number">1832353248</span>));</span><br><span class="line">    finish = clock();</span><br><span class="line">    <span class="built_in">printf</span>( <span class="string">"%f seconds\n"</span>,(finish - start) / CLOCKS_PER_SEC);</span><br><span class="line"></span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
