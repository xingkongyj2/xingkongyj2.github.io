                    <h2 id="实验3"><a href="#实验3" class="headerlink" title="实验3"></a>实验3</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="number">1.</span></span><br><span class="line">number=int(input())</span><br><span class="line">flag=<span class="literal">False</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> (number % <span class="number">3</span>)==<span class="number">0</span>:</span><br><span class="line">    print(<span class="string">"3"</span>,end =<span class="string">' '</span>)</span><br><span class="line">    flag =<span class="literal">True</span></span><br><span class="line"><span class="keyword">if</span> (number % <span class="number">5</span>)==<span class="number">0</span>:</span><br><span class="line">    print(<span class="string">"5"</span>,end =<span class="string">' '</span>)</span><br><span class="line">    flag = <span class="literal">True</span></span><br><span class="line"><span class="keyword">if</span> (number % <span class="number">7</span>)==<span class="number">0</span>:</span><br><span class="line">    print(<span class="string">"7"</span>)</span><br><span class="line">    flag = <span class="literal">True</span></span><br><span class="line"><span class="keyword">if</span> <span class="keyword">not</span> flag:</span><br><span class="line">    print(<span class="string">"n"</span>)</span><br><span class="line"></span><br><span class="line"><span class="number">2.</span></span><br><span class="line">weight=float(input(<span class="string">"请输入体重:"</span>))</span><br><span class="line">height=float(input(<span class="string">"请输入身高:"</span>))</span><br><span class="line"></span><br><span class="line">number_2=weight/(height*height)</span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span>(number_2&lt;<span class="number">18.5</span>):</span><br><span class="line">    print(<span class="string">"偏廋"</span>)</span><br><span class="line"><span class="keyword">elif</span> (number_2&gt;=<span class="number">18.5</span>)&amp;(number_2&lt;=<span class="number">22.9</span>):</span><br><span class="line">    print(<span class="string">"正常"</span>)</span><br><span class="line"><span class="keyword">elif</span> (number_2&gt;=<span class="number">23.0</span>)&amp;(number_2&lt;=<span class="number">24.9</span>):</span><br><span class="line">    print(<span class="string">"偏胖"</span>)</span><br><span class="line"><span class="keyword">elif</span> (number_2&gt;=<span class="number">25.0</span>)&amp;(number_2&lt;=<span class="number">29.9</span>):</span><br><span class="line">    print(<span class="string">"肥胖"</span>)</span><br><span class="line"><span class="keyword">else</span>:</span><br><span class="line">    print(<span class="string">"重度肥胖"</span>)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="number">3.</span></span><br><span class="line">number=int(input())</span><br><span class="line">sum=<span class="number">0</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(number):</span><br><span class="line">    tem =int(input())</span><br><span class="line">    sum+=tem</span><br><span class="line">print(<span class="string">"%d %.5f"</span> %(sum,sum/number))</span><br><span class="line"></span><br><span class="line"><span class="number">4.</span></span><br><span class="line">number=int(input())</span><br><span class="line">f=<span class="number">0</span></span><br><span class="line">g=<span class="number">1</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(number):</span><br><span class="line">    g=g+f;</span><br><span class="line">    f=g-f;</span><br><span class="line">    print(f,end=<span class="string">" "</span>)</span><br></pre></td></tr></table></figure>

<h2 id="实验4"><a href="#实验4" class="headerlink" title="实验4"></a>实验4</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="number">1.</span></span><br><span class="line">m,n=map(int,input().split())</span><br><span class="line"></span><br><span class="line">sum=<span class="number">0</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(m,n+<span class="number">1</span>):</span><br><span class="line">    <span class="keyword">if</span>(i%<span class="number">2</span>!=<span class="number">0</span>):</span><br><span class="line">        sum+=i</span><br><span class="line">print(sum)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="number">2.</span></span><br><span class="line">k=int(input())</span><br><span class="line">str=input().split()</span><br><span class="line"></span><br><span class="line">sum_1=<span class="number">0</span></span><br><span class="line">sum_2=<span class="number">0</span></span><br><span class="line">sum_3=<span class="number">0</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">for</span> n <span class="keyword">in</span> str:</span><br><span class="line">    number=int(n)</span><br><span class="line">    <span class="keyword">if</span> (number==<span class="number">1</span>):</span><br><span class="line">        sum_1+=<span class="number">1</span></span><br><span class="line">    <span class="keyword">if</span> (number==<span class="number">5</span>):</span><br><span class="line">        sum_2+=<span class="number">1</span></span><br><span class="line">    <span class="keyword">if</span> (number==<span class="number">10</span>):</span><br><span class="line">        sum_3+=<span class="number">1</span></span><br><span class="line">print(sum_1)</span><br><span class="line">print(sum_2)</span><br><span class="line">print(sum_3)</span><br><span class="line"></span><br><span class="line"><span class="number">3.</span></span><br><span class="line">n=input()</span><br><span class="line"><span class="keyword">if</span> <span class="string">'-'</span> <span class="keyword">in</span> n:</span><br><span class="line">    n= n[<span class="number">1</span>:]</span><br><span class="line">    print(<span class="string">'-'</span>,end =<span class="string">''</span>)</span><br><span class="line">print(int(n[::<span class="number">-1</span>]))</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="number">4.</span></span><br><span class="line">n=int(input())</span><br><span class="line"></span><br><span class="line">all_sum=<span class="number">0</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">1</span>,n+<span class="number">1</span>):</span><br><span class="line">    sum = <span class="number">1</span></span><br><span class="line">    <span class="keyword">for</span> k <span class="keyword">in</span> range(<span class="number">1</span>,i+<span class="number">1</span>):</span><br><span class="line">        sum*=k</span><br><span class="line">    all_sum+=sum</span><br><span class="line">print(all_sum)</span><br><span class="line"></span><br><span class="line"><span class="number">5.</span></span><br><span class="line">n=int(input())</span><br><span class="line"></span><br><span class="line">sum=<span class="number">0</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">1</span>,n+<span class="number">1</span>):</span><br><span class="line">    s=str(i)</span><br><span class="line">    <span class="keyword">for</span> k <span class="keyword">in</span> s:</span><br><span class="line">        <span class="keyword">if</span> k==<span class="string">'1'</span>:</span><br><span class="line">            sum+=<span class="number">1</span></span><br><span class="line">print(sum)</span><br></pre></td></tr></table></figure>

<h2 id="实验5"><a href="#实验5" class="headerlink" title="实验5"></a>实验5</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="number">1.</span></span><br><span class="line">str=input()</span><br><span class="line"></span><br><span class="line">alphabet = <span class="number">0</span></span><br><span class="line">number = <span class="number">0</span></span><br><span class="line">space = <span class="number">0</span></span><br><span class="line">rest = <span class="number">0</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> str:</span><br><span class="line">    <span class="keyword">if</span>(i.isalpha()):</span><br><span class="line">        alphabet +=<span class="number">1</span></span><br><span class="line">    <span class="keyword">elif</span>(i.isdigit()):</span><br><span class="line">        number +=<span class="number">1</span></span><br><span class="line">    <span class="keyword">elif</span>(i.isspace()):</span><br><span class="line">        space +=<span class="number">1</span></span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        rest +=<span class="number">1</span></span><br><span class="line">print(<span class="string">"alphabet:%d number:%d space:%d rest%d"</span> %(alphabet,number, space, rest))</span><br><span class="line"></span><br><span class="line"><span class="number">2.</span></span><br><span class="line">number=input()</span><br><span class="line"></span><br><span class="line">lenth=len(number)</span><br><span class="line">reverse=number[::<span class="number">-1</span>]</span><br><span class="line">print(<span class="string">"lenth:%d reverse:%s"</span> %(lenth,reverse))</span><br><span class="line"></span><br><span class="line"><span class="number">3.</span></span><br><span class="line">number=input()</span><br><span class="line"></span><br><span class="line">reverse=number[::<span class="number">-1</span>]</span><br><span class="line"><span class="keyword">if</span>(reverse==number):</span><br><span class="line">    print(<span class="string">"YES"</span>)</span><br><span class="line"><span class="keyword">else</span>:</span><br><span class="line">    print(<span class="string">"NO"</span>)</span><br><span class="line"></span><br><span class="line"><span class="number">4.</span></span><br><span class="line">n =int(input())</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">game</span><span class="params">(S1,S2)</span>:</span></span><br><span class="line">    <span class="keyword">if</span>(S1==<span class="string">'R'</span>):</span><br><span class="line">        <span class="keyword">if</span>(S2==<span class="string">'P'</span>):</span><br><span class="line">            print(<span class="string">"player2"</span>)</span><br><span class="line">        <span class="keyword">elif</span>(S2==<span class="string">'S'</span>):</span><br><span class="line">            print(<span class="string">"player1"</span>)</span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            print(<span class="string">"Tie"</span>)</span><br><span class="line">    <span class="keyword">if</span> (S1 == <span class="string">'S'</span>):</span><br><span class="line">        <span class="keyword">if</span> (S2 == <span class="string">'R'</span>):</span><br><span class="line">            print(<span class="string">"player2"</span>)</span><br><span class="line">        <span class="keyword">elif</span> (S2 == <span class="string">'P'</span>):</span><br><span class="line">            print(<span class="string">"player1"</span>)</span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            print(<span class="string">"Tie"</span>)</span><br><span class="line">    <span class="keyword">if</span> (S1 == <span class="string">'P'</span>):</span><br><span class="line">        <span class="keyword">if</span> (S2 == <span class="string">'S'</span>):</span><br><span class="line">            print(<span class="string">"player2"</span>)</span><br><span class="line">        <span class="keyword">elif</span> (S2 == <span class="string">'R'</span>):</span><br><span class="line">            print(<span class="string">"player1"</span>)</span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            print(<span class="string">"Tie"</span>)</span><br><span class="line"></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(n):</span><br><span class="line">    S1,S2=input().split()</span><br><span class="line">    game(S1[<span class="number">0</span>:<span class="number">1</span>],S2[<span class="number">0</span>:<span class="number">1</span>])</span><br><span class="line"></span><br><span class="line"><span class="number">5.</span></span><br><span class="line">str1=input()</span><br><span class="line">str2=input()</span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span>(str1 <span class="keyword">in</span> str2):</span><br><span class="line">    print(<span class="string">"%s is substring of %s"</span> %(str1,str2))</span><br><span class="line"><span class="keyword">elif</span>(str2 <span class="keyword">in</span> str1):</span><br><span class="line">    print(<span class="string">"%s is substring of %s"</span> % (str2, str1))</span><br><span class="line"><span class="keyword">else</span>:</span><br><span class="line">    print(<span class="string">"No substring"</span>)</span><br></pre></td></tr></table></figure>



<h2 id="实验6"><a href="#实验6" class="headerlink" title="实验6"></a>实验6</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="number">1.</span></span><br><span class="line">str=input()</span><br><span class="line">str_odd=<span class="string">''</span></span><br><span class="line">str_even=<span class="string">''</span></span><br><span class="line">sum=<span class="number">0</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> str:</span><br><span class="line">    sum =sum+<span class="number">1</span></span><br><span class="line">    <span class="keyword">if</span>(sum%<span class="number">2</span>==<span class="number">1</span>):</span><br><span class="line">        str_odd+=i</span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        str_even += i</span><br><span class="line">print(str_even+str_odd)</span><br><span class="line"></span><br><span class="line"><span class="number">2.</span></span><br><span class="line">str=input()</span><br><span class="line">str=str.lower()</span><br><span class="line">d=&#123;&#125;</span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> str:</span><br><span class="line">    d[i]=d.get(i,<span class="number">0</span>)+<span class="number">1</span>   <span class="comment">#get() 函数返回指定键的值，如果值不在字典中返回默认值。</span></span><br><span class="line">print(d)</span><br><span class="line"></span><br><span class="line"><span class="number">3.</span></span><br><span class="line">li=[<span class="number">1</span>,<span class="number">2</span>,<span class="number">3</span>,<span class="number">4</span>,<span class="number">5</span>,<span class="number">6</span>,<span class="number">7</span>]</span><br><span class="line">lenth=len(li)</span><br><span class="line">mid=<span class="number">7</span>//<span class="number">2</span></span><br><span class="line">print(li[mid])</sp ng">'女'</span>,</span><br><span class="line">&#125;</span><br><span class="line"><span class="keyword">for</span> key,value <span class="keyword">in</span> list(di.items()):  <span class="comment">#字典转化成为列表</span></span><br><span class="line">    <span class="keyword">if</span> value ==<span class="string">'男'</span>:</span><br><span class="line">        <span class="keyword">del</span> di[key]</span><br><span class="line">print(di)</span><br></pre></td></tr></table></figure>



<h2 id="试验7"><a href="#试验7" class="headerlink" title="试验7"></a>试验7</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="number">1.</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">mul</span><span class="params">(n)</span>:</span></span><br><span class="line">    all_sum = <span class="number">0</span></span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">1</span>, n + <span class="number">1</span>):</span><br><span class="line">        sum = <span class="number">1</span></span><br><span class="line">        <span class="keyword">for</span> k <span class="keyword">in</span> range(<span class="number">1</span>, i + <span class="number">1</span>):</span><br><span class="line">            sum *= k</span><br><span class="line">        all_sum += sum</span><br><span class="line">    print(all_sum)</span><br><span class="line"></span><br><span class="line">n=int(input())</span><br><span class="line">mul(n)</span><br><span class="line"></span><br><span class="line"><span class="number">2.</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">getMax</span><span class="params">(list)</span>:</span></span><br><span class="line">    d=<span class="number">-1</span></span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> list:</span><br><span class="line">        <span class="keyword">if</span>(i&gt;d):</span><br><span class="line">            d=i</span><br><span class="line">    <span class="keyword">return</span> d</span><br><span class="line"></span><br><span class="line">a,b,c=map(int,input().split())</span><br><span class="line">list=[a,b,c]</span><br><span class="line">print(getMax(list))</span><br><span class="line"></span><br><span class="line"><span class="number">3.</span></span><br><span class="line">n=int(input())</span><br><span class="line"></span><br><span class="line">all_sum=<span class="number">0</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">1</span>,n+<span class="number">1</span>):</span><br><span class="line">    all_sum =all_sum+((<span class="number">1</span>/(i*(i+<span class="number">1</span>)))*((<span class="number">-1</span>)**(i+<span class="number">1</span>)))</span><br><span class="line">print(all_sum)</span><br><span class="line"></span><br><span class="line"><span class="number">4.</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">loop</span><span class="params">(number)</span>:</span></span><br><span class="line">    reverse = number[::<span class="number">-1</span>]</span><br><span class="line">    <span class="keyword">if</span> (reverse == number):</span><br><span class="line">        print(<span class="string">"YES"</span>)</span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        print(<span class="string">"NO"</span>)</span><br><span class="line"></span><br><span class="line">number=input()</span><br><span class="line">loop(number)</span><br><span class="line"></span><br><span class="line"><span class="number">5.</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">triangle</span><span class="params">(a,b,c)</span>:</span></span><br><span class="line">    <span class="keyword">if</span>(a+b&gt;c &amp; a+c&gt;b &amp; b+c&gt;a):</span><br><span class="line">        print(<span class="string">"三边能构成三角形"</span>)</span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        print(<span class="string">"三边不能构成三角形"</span>)</span><br><span class="line"></span><br><span class="line">a,b,c=map(int,input().split())</span><br><span class="line">triangle(a,b,c)</span><br><span class="line"></span><br><span class="line"><span class="number">6.</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">min_times</span><span class="params">(a,b)</span>:</span></span><br><span class="line">    m,n=a,b</span><br><span class="line">    <span class="keyword">while</span>(b!=<span class="number">0</span>):    <span class="comment">#辗转相除法算出最大公约数</span></span><br><span class="line">        c=a%b</span><br><span class="line">        a=b</span><br><span class="line">        b=c</span><br><span class="line">    print(<span class="string">"最小公倍数:"</span>+str(m*n/a))    <span class="comment">#最小公倍数=两整数的乘积÷最大公约数</span></span><br><span class="line"></span><br><span class="line">a,b=map(int,input().split())</span><br><span class="line">min_times(a,b)</span><br></pre></td></tr></table></figure>



<h2 id="实验8"><a href="#实验8" class="headerlink" title="实验8"></a>实验8</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="number">1.</span></span><br><span class="line">li=[]</span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">divide</span><span class="params">(number)</span>:</span></span><br><span class="line">    <span class="keyword">if</span>(number==<span class="number">0</span>): <span class="keyword">return</span></span><br><span class="line">    tmp=number%<span class="number">10</span></span><br><span class="line">    li.append(tmp)</span><br><span class="line">    divide(int(number/<span class="number">10</span>))</span><br><span class="line">number=int(input())</span><br><span class="line">divide(number)</span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> li[::<span class="number">-1</span>]:</span><br><span class="line">    print(i,end =<span class="string">' '</span>)</span><br><span class="line"></span><br><span class="line"><span class="number">2.</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">prime</span><span class="params">(number)</span>:</span></span><br><span class="line">    flag=<span class="number">0</span></span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">2</span>,number):</span><br><span class="line">        <span class="keyword">if</span>(number%i==<span class="number">0</span>):</span><br><span class="line">            number=int(number/i)</span><br><span class="line">            print(str(i)+<span class="string">'*'</span>,end =<span class="string">''</span>)</span><br><span class="line">            <span class="keyword">break</span></span><br><span class="line">        flag = i+<span class="number">1</span></span><br><span class="line">    <span class="keyword">if</span>(flag==number):</span><br><span class="line">        print(number)</span><br><span class="line">        <span class="keyword">return</span></span><br><span class="line">    prime(number)</span><br><span class="line"></span><br><span class="line">number=int(input())</span><br><span class="line">prime(number)</span><br><span class="line"></span><br><span class="line"><span class="number">3.</span></span><br><span class="line">student_infos = []</span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">print_menu</span><span class="params">()</span>:</span></span><br><span class="line">    print(<span class="string">"="</span> * <span class="number">30</span>)</span><br><span class="line">    print(<span class="string">" 学生管理系统V1.0 "</span>)</span><br><span class="line">    print(<span class="string">"1.添加学生信息"</span>)</span><br><span class="line">    print(<span class="string">"2.删除学生信息"</span>)</span><br><span class="line">    print(<span class="string">"3.修改学生信息"</span>)</span><br><span class="line">    print(<span class="string">"4.显示所以学生信息"</span>)</span><br><span class="line">    print(<span class="string">"0.退出系统"</span>)</span><br><span class="line">    print(<span class="string">"="</span> * <span class="number">30</span>)</span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">add_info</span><span class="params">()</span>:</span></span><br><span class="line">    new_name = input(<span class="string">"请输入新学生的名字："</span>)</span><br><span class="line">    new_sex = input(<span class="string">"请输入新学生的性别：（男/女）"</span>)</span><br><span class="line">    new_phone = input(<span class="string">"请输入新学生的手机号码："</span>)</span><br><span class="line">    new_infos = &#123;&#125;</span><br><span class="line">    new_infos[<span class="string">'name'</span>] = new_name</span><br><span class="line">    new_infos[<span class="string">'sex'</span>] = new_sex</span><br><span class="line">    new_infos[<span class="string">'phone'</span>] = new_phone</span><br><span class="line">    student_infos.append(new_infos)</span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">del_info</span><span class="params">(student)</span>:</span></span><br><span class="line">    del_number = int(input(<span class="string">"请输入要删除的序号："</span>)) - <span class="number">1</span></span><br><span class="line">    <span class="keyword">del</span> student[del_number]</span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">modify_info</span><span class="params">()</span>:</span></span><br><span class="line">    student_id = int(input(<span class="string">"请输入要修改的学生的序号："</span>))</span><br><span class="line">    new_name = input(<span class="string">"请输入新学生的名字："</span>)</span><br><span class="line">    new_sex = input(<span class="string">"请输入新学生的性别：（男/女）"</span>)</span><br><span class="line">    new_phone = input(<span class="string">"请输入新学生的手机号码："</span>)</span><br><span class="line">    student_infos[student_id - <span class="number">1</span>][<span class="string">'name'</span>] = new_name</span><br><span class="line">    student_infos[student_id - <span class="number">1</span>][<span class="string">'sex'</span>] = new_sex</span><br><span class="line">    student_infos[student_id - <span class="number">1</span>][<span class="string">'phone'</span>] = new_phone</span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">show_infos</span><span class="params">()</span>:</span></span><br><span class="line">    print(<span class="string">"="</span> * <span class="number">30</span>)</span><br><span class="line">    print(<span class="string">"学生的信息如下："</span>)</span><br><span class="line">    print(<span class="string">"="</span> * <span class="number">30</span>)</span><br><span class="line">    print(<span class="string">"序号   姓名   性别   手机号码"</span>)</span><br><span class="line">    i = <span class="number">1</span></span><br><span class="line">    <span class="keyword">for</span> temp <span class="keyword">in</span> student_infos:</span><br><span class="line">        print(<span class="string">"%d   %s   %s   %s"</span> % (i, temp[<span class="string">'name'</span>], temp[<span class="string">'sex'</span>], temp[<span class="string">'phone'</span>]))</span><br><span class="line">        i += <span class="number">1</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">main</span><span class="params">()</span>:</span></span><br><span class="line">    <span class="keyword">while</span> <span class="literal">True</span>:</span><br><span class="line">        print_menu()</span><br><span class="line">        key = input(<span class="string">"请输入功能对应的数字："</span>)</span><br><span class="line">        <span class="keyword">if</span> key == <span class="string">'1'</span>:</span><br><span class="line">            add_info()</span><br><span class="line">        <span class="keyword">elif</span> key == <span class="string">'2'</span>:</span><br><span class="line">            del_info(student_infos)</span><br><span class="line">        <span class="keyword">elif</span> key == <span class="string">'3'</span>:</span><br><span class="line">            modify_info()</span><br><span class="line">        <span class="keyword">elif</span> key == <span class="string">'4'</span>:</span><br><span class="line">            show_infos()</span><br><span class="line">        <span class="keyword">elif</span> key == <span class="string">'0'</span>:</span><br><span class="line">            quit_confirm = input(<span class="string">"亲，真的要退出么？(Yes or No)："</span>)</span><br><span class="line">            <span class="keyword">if</span> quit_confirm == <span class="string">"Yes"</span>:</span><br><span class="line">                <span class="keyword">break</span></span><br><span class="line">            <span class="keyword">else</span>:</span><br><span class="line">                print(<span class="string">"输入有误，请重新输入"</span>)</span><br><span class="line">main()</span><br></pre></td></tr></table></figure>
