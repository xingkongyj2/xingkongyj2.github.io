                    <h2 id="参考"><a href="#参考" class="headerlink" title="参考"></a>参考</h2><p><a href="https://docs.python.org/zh-cn/3/library/turtle.html#filling" target="_blank" rel="noopener">官方文档</a></p>
<h2 id="小猪佩奇绘制"><a href="#小猪佩奇绘制" class="headerlink" title="小猪佩奇绘制"></a>小猪佩奇绘制</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="keyword">import</span> turtle <span class="keyword">as</span> t</span><br><span class="line"></span><br><span class="line"><span class="comment"># 准备设置</span></span><br><span class="line">t.screensize(<span class="number">400</span>, <span class="number">300</span>)  <span class="comment"># 设置画布大小</span></span><br><span class="line">t.pensize(<span class="number">4</span>)  <span class="comment"># 设置画笔的大小</span></span><br><span class="line">t.colormode(<span class="number">255</span>)  <span class="comment"># 设置GBK颜色范围为0-255</span></span><br><span class="line">t.color((<span class="number">255</span>, <span class="number">155</span>, <span class="number">192</span>), <span class="string">"pink"</span>)  <span class="comment"># 设置画笔颜色和填充颜色(pink)</span></span><br><span class="line">t.setup(<span class="number">840</span>, <span class="number">500</span>)  <span class="comment"># 设置主窗口的大小为840*500</span></span><br><span class="line">t.speed(<span class="number">10</span>)  <span class="comment"># 设置画笔速度为10</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 画鼻子</span></span><br><span class="line">t.penup()  <span class="comment"># 提笔</span></span><br><span class="line">t.goto(<span class="number">-100</span>, <span class="number">100</span>)  <span class="comment"># 画笔前往坐标(-100,100)</span></span><br><span class="line">t.pendown()  <span class="comment"># 下笔</span></span><br><span class="line">t.seth(<span class="number">-30</span>)  <span class="comment"># 笔的角度为-30°（鼻子向右倾斜30度），但未行进</span></span><br><span class="line">t.begin_fill()  <span class="comment"># 外形填充的开始标志</span></span><br><span class="line">a = <span class="number">0.4</span>  <span class="comment"># 设置初始步长</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">120</span>):  <span class="comment"># 循环一个从0开始到119的列表</span></span><br><span class="line">    <span class="keyword">if</span> <span class="number">0</span> &lt;= i &lt; <span class="number">30</span> <span class="keyword">or</span> <span class="number">60</span> &lt;= i &lt; <span class="number">90</span>:</span><br><span class="line">        a = a + <span class="number">0.08</span></span><br><span class="line">        t.lt(<span class="number">3</span>)  <span class="comment"># 向左转3度</span></span><br><span class="line">        t.fd(a)  <span class="comment"># 向前走a的步长</span></span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        a = a - <span class="number">0.08</span></span><br><span class="line">        t.lt(<span class="number">3</span>)  <span class="comment"># 向左转3度</span></span><br><span class="line">        t.fd(a)  <span class="comment"># 向前走a的步长</span></span><br><span class="line">t.end_fill()  <span class="comment"># 依据轮廓填充颜色</span></span><br><span class="line">t.penup()  <span class="comment"># 提笔</span></span><br><span class="line">t.seth(<span class="number">90</span>)  <span class="comment"># 笔的角度为90度</span></span><br><span class="line">t.fd(<span class="number">25</span>)  <span class="comment"># 向前移动25</span></span><br><span class="line">t.seth(<span class="number">0</span>)  <span class="comment"># 转换画笔的角度为0</span></span><br><span class="line">t.fd(<span class="number">10</span>)  <span class="comment"># 向前移动10</span></span><br><span class="line">t.pendown()  <span class="comment"># 下笔</span></span><br><span class="line">t.pencolor(<span class="number">255</span>, <span class="number">155</span>, <span class="number">192</span>)  <span class="comment"># 设置画笔颜色</span></span><br><span class="line">t.seth(<span class="number">10</span>)  <span class="comment"># 转换画笔的角度为10</span></span><br><span class="line">t.begin_fill()  <span class="comment"># 外形填充开始标志</span></span><br><span class="line">t.circle(<span class="number">5</span>)  <span class="comment"># 画一个半径为5的圆</span></span><br><span class="line">t.color(<span class="number">160</span>, <span class="number">82</span>, <span class="number">45</span>)  <span class="comment"># 设置填充颜色</span></span><br><span class="line">t.end_fill()  <span class="comment"># 依据轮廓填充颜色</span></span><br><span class="line">t.penup()  <span class="comment"># 提笔</span></span><br><span class="line">t.seth(<span class="number">0</span>)  <span class="comment"># 转换画笔的角度为0</span></span><br><span class="line">t.fd(<span class="number">20</span>)  <span class="comment"># 向前移动25</span></span><br><span class="line">t.pendown()  <span class="comment"># 下笔</span></span><br><span class="line">t.pencolor(<span class="number">255</span>, <span class="number">155</span>, <span class="number">192</span>)  <span class="comment"># 设置画笔和填充颜色</span></span><br><span class="line">t.seth(<span class="number">10</span>)  <span class="comment"># 转换画笔的角度为10</span></span><br><span class="line">t.begin_fill()  <span class="comment"># 外形填充开始标志</span></span><br><span class="line">t.circle(<span class="number">5</span>)  <span class="comment"># 画一个半径为5的圆</span></span><br><span class="line">t.color(<span class="number">160</span>, <span class="number">82</span>, <span class="number">45</span>)  <span class="comment"># 设置填充颜色</span></span><br><span class="line">t.end_fill()  <span class="comment"># 依据轮廓填充颜色</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 以此类推，画头</span></span><br><span class="line">t.color((<span class="number">255</span>, <span class="number">155</span>, <span class="number">192</span>), <span class="string">"pink"</span>)</span><br><span class="line">t.penup()</span><br><span class="line">t.seth(<span class="number">90</span>)</span><br><span class="line">t.fd(<span class="number">41</span>)</span><br><span class="line">t.seth(<span class="number">0</span>)</span><br><span class="line">t.fd(<span class="number">0</span>)</span><br><span class="line">t.pendown()</span><br><span class="line">t.begin_fill()</span><br><span class="line">t.seth(<span class="number">180</span>)</span><br><span class="line">t.circle(<span class="number">300</span>, <span class="number">-30</span>)  <span class="comment"># 顺时针画一个半径为300,圆心角为30°的不完整圆</span></span><br><span class="line">t.circle(<span class="number">100</span>, <span class="number">-60</span>)  <span class="comment"># 接上去</span></span><br><span class="line">t.circle(<span class="number">80</span>, <span class="number">-100</span>)</span><br><span class="line">t.circle(<span class="number">150</span>, <span class="number">-20</span>)</span><br><span class="line">t.circle(<span class="number">60</span>, <span class="number">-95</span>)</span><br><span class="line">t.seth(<span class="number">161</span>)</span><br><span class="line">t.circle(<span class="number">-300</span>, <span class="number">15</span>)</span><br><span class="line">t.penup()</span><br><span class="line">t.goto(<span class="number">-100</span>, <span class="number">100</span>)</span><br><span class="line">t.pendown()</span><br><span class="line">t.seth(<span class="number">-30</span>)</span><br><span class="line">a = <span class="number">0.4</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">60</span>):</span><br><span class="line">    <span class="keyword">if</span> <span class="number">0</span> &lt;= i &lt; <span class="number">30</span> <span class="keyword">or</span> <span class="number">60</span> &lt;= i &lt; <span class="number">90</span>:</span><br><span class="line">        a = a + <span class="number">0.08</span></span><br><span class="line">        t.lt(<span class="number">3</span>)  <span class="comment"># 向左转3度</span></span><br><span class="line">        t.fd(a)  <span class="comment"># 向前走a的步长</span></span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        a = a - <span class="number">0.08</span></span><br><span class="line">        t.lt(<span class="number">3</span>)</span><br><span class="line">        t.fd(a)</span><br><span class="line">t.end_fill()  <span class="comment"># 回到画头出发点，闭合填充背景色</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 画耳朵</span></span><br><span class="line">t.color((<span class="number">255</span>, <span class="number">155</span>, <span class="number">192</span>), <span class="string">"pink"</span>)</span><br><span class="line">t.penup()</span><br><span class="line">t.seth(<span class="number">90</span>)</span><br><span class="line">t.fd(<span class="number">-7</span>)</span><br><span class="line">t.seth(<span class="number">0</span>)</span><br><span class="line">t.fd(<span class="number">70</span>)</span><br><span class="line">t.pendown()</span><br><span class="line">t.begin_fill()</span><br><span class="line">t.seth(<span class="number">100</span>)</span><br><span class="line">t.circle(<span class="number">-50</span>, <span class="number">50</span>)</span><br><span class="line">t.circle(<span class="number">-10</span>, <span class="number">120</span>)</span><br><span class="line">t.circle(<span class="number">-50</span>, <span class="number">54</span>)</span><br><span class="line">t.end_fill()</span><br><span class="line">t.penup()</span><br><span class="line">t.seth(<span class="number">90</span>)</span><br><span class="line">t.fd(<span class="number">-12</span>)</span><br><span class="line">t.seth(<span class="number">0</span>)</span><br><span class="line">t.fd(<span class="number">30</span>)</span><br><span class="line">t.pendown()</span><br><span class="line">t.begin_fill()</span><br><span class="line">t.seth(<span class="number">100</span>)</span><br><span class="line">t.circle(<span class="number">-50</span>, <span class="number">50</span>)</span><br><span class="line">t.circle(<span class="number">-10</span>, <span class="number">120</span>)</span><br><span class="line">t.circle(<span class="number">-50</span>, <span class="number">56</span>)</span><br><span class="line">t.end_fill()</span><br><span class="line"></span><br><span class="line"><span class="comment"># 画眼睛</span></span><br><span class="line">t.color((<span class="number">255</span>, <span class="number">155</span>, <span class="number">192</span>), <span class="string">"white"</span>)</span><br><span class="line">t.penup()</span><br><span class="line">t.seth(<span class="number">90</span>)</span><br><span class="line">t.fd(<span class="number">-20</span>)</span><br><span class="line">t.seth(<span class="number">0</span>)</span><br><span class="line">t.fd(<span class="number">-95</span>)</span><br><span class="line">t.pendown()</span><br><span class="line">t.begin_fill()</span><br><span class="line">t.circle(<span class="number">15</span>)</span><br><span class="line">t.end_fill()</span><br><span class="line">t.color(<span class="string">"black"</span>)</span><br><span class="line">t.penup()</span><br><span class="line">t.seth(<span class="number">90</span>)</span><br><span class="line">t.fd(<span class="number">12</span>)</span><br><span class="line">t.seth(<span class="number">0</span>)</span><br><span class="line">t.fd(<span class="number">-3</span>)</span><br><span class="line">t.pendown()</span><br><span class="line">t.begin_fill()</span><br><span class="line">t.circle(<span class="number">3</span>)</span><br><span class="line">t.end_fill()</span><br><span class="line">t.color((<span class="number">255</span>, <span class="number">155</span>, <span class="number">192</span>), <span class="string">"white"</span>)</span><br><span class="line">t.penup()</span><br><span class="line">t.seth(<span class="number">90</span>)</span><br><span class="line">t.fd(<span class="number">-25</span>)</span><br><span class="line">t.seth(<span class="number">0</span>)</span><br><span class <h2 id="五角星绘制"><a href="#五角星绘制" class="headerlink" title="五角星绘制"></a>五角星绘制</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="keyword">import</span> turtle		         <span class="comment">#导入turtle库包</span></span><br><span class="line">turtle.screensize(<span class="number">200</span>, <span class="number">150</span>)      <span class="comment">#设置画布大小</span></span><br><span class="line">turtle.speed(<span class="number">2</span>) <span class="comment">#设置画笔速度为2</span></span><br><span class="line">turtle.fillcolor(<span class="string">"black"</span>)        <span class="comment">#填充颜色</span></span><br><span class="line">turtle.begin_fill()              <span class="comment">#开始画，类似起笔</span></span><br><span class="line">turtle.up()                      <span class="comment">#提笔</span></span><br><span class="line">count = <span class="number">1</span>                        <span class="comment">#计时器，用于计录次数</span></span><br><span class="line"><span class="keyword">while</span> count &lt;= <span class="number">5</span>:                <span class="comment">#控制绘制次数</span></span><br><span class="line">    turtle.forward(<span class="number">250</span>)	         <span class="comment">#画笔绘制的方向，向前移动指定的距离</span></span><br><span class="line">    turtle.right(<span class="number">144</span>)		 <span class="comment">#向右转144度</span></span><br><span class="line">    count += <span class="number">1</span>                   <span class="comment">#循环绘制</span></span><br><span class="line">    turtle.down()                <span class="comment">#下笔</span></span><br><span class="line">turtle.end_fill()                <span class="comment">#完成填充图片的绘制</span></span><br><span class="line">turtle.done()                    <span class="comment">#保持窗口停留</span></span><br></pre></td></tr></table></figure>

<h2 id="小蟒蛇绘制"><a href="#小蟒蛇绘制" class="headerlink" title="小蟒蛇绘制"></a>小蟒蛇绘制</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="keyword">import</span> turtle <span class="comment">#引用绘图库 turtle</span></span><br><span class="line">turtle.screensize(<span class="number">500</span>, <span class="number">300</span>)<span class="comment">#设置画布大小</span></span><br><span class="line">turtle.setup(<span class="number">800</span>, <span class="number">400</span>, <span class="number">300</span>, <span class="number">300</span>) <span class="comment"># 设置主窗口的大小和位置,后两个参数可选</span></span><br><span class="line">turtle.speed(<span class="number">2</span>) <span class="comment">#设置画笔速度为2</span></span><br><span class="line">turtle.penup() <span class="comment">#提起笔移动，不绘制图形</span></span><br><span class="line">turtle.fd(<span class="number">-330</span>)<span class="comment"># 画笔向绘制方向的当前方向移动distance(integer or float)的pixels距离</span></span><br><span class="line">turtle.pendown()<span class="comment">#落下画笔</span></span><br><span class="line">turtle.pensize(<span class="number">20</span>) <span class="comment">#设置画笔的宽度；</span></span><br><span class="line">turtle.pencolor(<span class="string">"green"</span>) <span class="comment">#画笔颜色设成绿色</span></span><br><span class="line">turtle.seth(<span class="number">-45</span>) <span class="comment"># 只改变行进方向（角度按逆时针），但不行进</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">5</span>):</span><br><span class="line">    turtle.circle(<span class="number">40</span>, <span class="number">90</span>) <span class="comment">#画圆，半径为正(负)，表示圆心在画笔的左边(右边)画圆</span></span><br><span class="line">    turtle.circle(<span class="number">-40</span>, <span class="number">90</span>)</span><br><span class="line">turtle.circle(<span class="number">40</span>, <span class="number">80</span>/<span class="number">2</span>)</span><br><span class="line">turtle.fd(<span class="number">40</span>)</span><br><span class="line">turtle.circle(<span class="number">16</span>, <span class="number">180</span>)</span><br><span class="line">turtle.fd(<span class="number">40</span> * <span class="number">2</span>/<span class="number">3</span>)</span><br><span class="line">turtle.end_fill() <span class="comment">#完成填充图片的绘制</span></span><br><span class="line">turtle.done() <span class="comment">#保持窗口停留</span></span><br></pre></td></tr></table></figure>



<h2 id="四叶草绘制源码"><a href="#四叶草绘制源码" class="headerlink" title="四叶草绘制源码"></a>四叶草绘制源码</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="keyword">import</span> turtle <span class="keyword">as</span> t</span><br><span class="line"></span><br><span class="line"><span class="comment">#准备设置</span></span><br><span class="line">t.screensize(<span class="number">400</span>, <span class="number">300</span>) <span class="comment">#设置画布大小</span></span><br><span class="line">t.setup(<span class="number">840</span>, <span class="number">500</span>) <span class="comment">#设置主窗口的大小为840*500</span></span><br><span class="line">t.pensize(<span class="number">5</span>) <span class="comment">#设置外花边的大小</span></span><br><span class="line">t.color(<span class="string">'mediumseagreen'</span>, <span class="string">'forestgreen'</span>) <span class="comment">#设置画笔颜色和填充颜色</span></span><br><span class="line">t.speed(<span class="number">10</span>) <span class="comment">#设置画笔速度为10</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">draw_clover</span><span class="params">(radius, rotate)</span>:</span> <span class="comment">#参数radius控制叶子的大小，rotate控制叶子的旋转</span></span><br><span class="line">    t.begin_fill() <span class="comment">#外形填充开始标志</span></span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">4</span>): <span class="comment">#从0到3开始的for循环，共四片花瓣</span></span><br><span class="line">        direction = i * <span class="number">90</span></span><br><span class="line">        t.seth(<span class="number">60</span> + direction + rotate)   <span class="comment">#控制叶子根部的角度为60度</span></span><br><span class="line">        t.fd(<span class="number">4</span> * radius)</span><br><span class="line">        <span class="keyword">for</span> j <span class="keyword">in</span> range(<span class="number">2</span>):</span><br><span class="line">            t.seth(<span class="number">90</span> + direction + rotate)</span><br><span class="line">            t.circle(radius, <span class="number">180</span>)</span><br><span class="line">        t.seth(<span class="number">-60</span> + direction + rotate)</span><br><span class="line">        t.fd(<span class="number">4</span> * radius)</span><br><span class="line">        t.seth(<span class="number">60</span> + direction+rotate)   <span class="comment">#控制叶子根部的角度为60度</span></span><br><span class="line">        t.fd(<span class="number">2</span> * radius)</span><br><span class="line">        <span class="keyword">for</span> j <span class="keyword">in</span> range(<span class="number">2</span>): <span class="comment">#从0到1开始的for循环，画内花边</span></span><br><span class="line">            t.pencolor(<span class="string">"whitesmoke"</span>) <span class="comment">#设置内花边颜色</span></span><br><span class="line">            t.pensize(<span class="number">8</span>) <span class="comment">#设置内花边的大小</span></span><br><span class="line">            t.seth(<span class="number">90</span> + direction + rotate)</span><br><span class="line">            t.circle(radius/<span class="number">2</span>, <span class="number">180</span>)</span><br><span class="line">            t.color(<span class="string">'mediumseagreen'</span>, <span class="string">'forestgreen'</span>)</span><br><span class="line">            t.pensize(<span class="number">5</span>)</span><br><span class="line">        t.seth(<span class="number">-60</span> + direction + rotate)</span><br><span class="line">        t.fd(<span class="number">2</span> * radius)</span><br><span class="line">    t.end_fill() <span class="comment">#依据轮廓填充颜色</span></span><br><span class="line">    t.seth(<span class="number">-110</span>)</span><br><span class="line">    t.fd(<span class="number">6</span> * radius)</span><br><span class="line"></span><br><span class="line">draw_clover(<span class="number">40</span>, <span class="number">25</span>)</span><br><span class="line">t.done() <span class="comment">#保持窗口停留</span></span><br></pre></td></tr></table></figure>



<h2 id="狮子绘制"><a href="#狮子绘制" class="headerlink" title="狮子绘制"></a>狮子绘制</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="keyword">import</span> turtle <span class="keyword">as</span> t</span><br><span class="line"></span><br><span class="line"><span class="comment">#准备设置</span></span><br><span class="line">t.screensize(<span class="number">400</span>, <span class="number">300</span>) <span class="comment">#设置画布大小</span></span><br><span class="line">t.setup(<span class="number">840</span>, <span class="number">500</span>) <span class="comment">#设置主窗口的大小为840*500</span></span><br><span class="line">t.speed(<span class="number">10</span>) <span class="comment">#设置画笔速度为10</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#画头发</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">hair</span><span class="params">()</span>:</span>  </span><br><span class="line">    t.penup()</span><br><span class="line">    t.goto(<span class="number">-70</span>, <span class="number">125</span>)</span><br><span class="line">    t.pendown()</span><br><span class="line">    t.fillcolor(<span class="string">'saddlebrown'</span>) <span class="comment">#设置填充色</span></span><br><span class="line">    t.begin_fill()</span><br><span class="line">    <span class="keyword">for</span> j <span class="keyword">in</span> range(<span class="number">12</span>):</span><br><span class="line">        t.setheading(<span class="number">60</span> - (j * <span class="number">30</span>)) <span class="comment">#每次调整画笔角度</span></span><br><span class="line">        t.circle(<span class="number">-50</span>, <span class="number">90</span>) <span class="comment">#画120度的弧</span></span><br><span class="line">    t.end_fill()</span><br><span class="line">    </span><br><span class="line"><span class="comment">#画耳朵，dir用来设置方向，左右耳对称</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">ears</span><span class="params">(dir)</span>:</span>  </span><br><span class="line">    t.penup()</span><br><span class="line">    t.goto((<span class="number">0</span> - dir) * <span class="number">25</span>, <span class="number">75</span>)</span><br><span class="line">    t.setheading(<span class="number">90</span>)</span><br><span class="line">    t.pendown()</span><br><span class="line">    t.fillcolor(<span class="string">'peru'</span>)</span><br><span class="line">    t.begin_fill()</span><br><span class="line">    t.circle(dir * <span class="number">28</span>)</span><br><span class="line">    t.end_fill()</span><br><span class="line">    t.penup()</span><br><span class="line">    t.goto((<span class="number">0</span> - dir) * <span class="number">30</span>, <span class="number">68</span>)</span><br><span class="line">    t.setheading(<span class="number">90</span>)</span><br><span class="line">    t.pendown()</span><br><span class="line">    t.fillcolor(<span class="string">'white'</span>)</span><br><span class="line">    t.begin_fill()</span><br><span class="line">    t.circle(dir * <span class="number">18</span>)</span><br><span class="line">    t.end_fill()</span><br><span class="line"></span><br><span class="line"><span class="comment">#画脸</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">face</span><span class="params">()</span>:</span>  </span><br><span class="line">    t.penup()</span><br><span class="line">    t.goto(<span class="number">0</span>, <span class="number">80</span>)</span><br><span class="line">    t.pendown()</span><br><span class="line">    t.fillcolor(<span class="string">'peru'</span>)</span><br><span class="line">    t.begin_fill()</span><br><span class="line">    t.setheading(<span class="number">180</span>)</span><br><span class="line">    t.circle(<span class="number">80</span>)</span><br><span class="line">    t.end_fill()</span><br><span class="line">    <span class="comment"># 下巴</span></span><br><span class="line">    t.circle(<span class="number">80</span>, <span class="number">125</span>)</span><br><span class="line">    t.fillcolor(<span class="string">'white'</span>)</span><br><span class="line">    t.begin_fill()</span><br><span class="line">    t.circle(<span class="number">80</span>, <span class="number">110</span>)</span><br><span class="line">    t.setheading(<span class="number">145</span>)</span><br><span class="line">    t.circle(<span class="number">110</span>, <span class="number">72</span>)</span><br><span class="line">    t.end_fill()</span><br><span class="line">    </span><br><span class="line"><span class="comment">#画眼睛，dir用来设置方向，左右眼对称</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">eye</span><span class="params">(dir)</span>:</span>  </span><br><span class="line">    t.penup()</span><br><span class="line">    t.goto((<span class="number">0</span> - dir) * <span class="number">30</span>, <span class="number">20</span>)</span><br><span class="line">    t.setheading(<span class="number">0</span>)</span><br><span class="line">    t.pendown()</span><br><span class="line">    t.fillcolor(<span class="string">'black'</span>)</span><br><span class="line">    t.begin_fill()</span><br><span class="line">    t.circle(<span class="number">10</span>)</span><br><span class="line">    t.end_fill()  </span><br><span class="line"> </span><br><span class="line"><span class="comment">#画嘴巴    </span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">mouth</span><span class="params">()</span>:</span>  </span><br><span class="line">    t.penup()</span><br><span class="line">    t.goto(<span class="number">0</span>, <span class="number">0</span>)</span><br><span class="line">    t.setheading(<span class="number">-90</span>)</span><br><span class="line">    t.pendown()</span><br><span class="line">    t.forward(<span class="number">50</span>)</span><br><span class="line">    t.setheading(<span class="number">0</span>)</span><br><span class="line">    t.circle(<span class="number">80</span>, <span class="number">25</span>)</span><br><span class="line">    t.penup()</span><br><span class="line">    t.goto(<span class="number">0</span>, <span class="number">-50</span>)</span><br><span class="line">    t.setheading(<span class="number">180</span>)</span><br><span class="line">    t.pendown()</span><br><span class="line">    t.circle(<span class="number">-80</span>, <span class="number">25</span>)</span><br><span class="line">    </span><br><span class="line"><span class="comment">#画鼻子</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">nose</span><span class="params">()</span>:</span>  </span><br><span class="line">    t.penup()</span><br><span class="line">    t.goto(<span class="number">15</span>, <span class="number">0</span>)</span><br><span class="line">    t.setheading(<span class="number">90</span>)</span><br><span class="line">    t.pendown()</span><br><span class="line">    t.fillcolor(<span class="string">'saddlebrown'</span>)</span><br><span class="line">    t.begin_fill()</span><br><span class="line">    t.circle(<span class="number">15</span>)</span><br><span class="line">    t.end_fill()</span><br><span class="line">    </span><br><span class="line">hair()</span><br><span class="line">ears(<span class="number">1</span>)</span><br><span class="line">ears(<span class="number">-1</span>)</span><br><span class="line">face()</span><br><span class="line">eye(<span class="number">1</span>)</span><br><span class="line">eye(<span class="number">-1</span>)</span><br><span class="line">mouth()</span><br><span class="line">nose()</span><br><span class="line"></span><br><span class="line">t.done() <span class="comment">#保持窗口停留</span></span><br></pre></td></
