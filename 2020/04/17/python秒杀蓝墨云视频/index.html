ring">"XMLHttpRequest"</span>,</span><br><span class="line">        <span class="string">"User-Agent"</span>: <span class="string">"Mozilla/5.0 (Windows NT 6.3; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/74.0.3729.169 Safari/537.36"</span>,</span><br><span class="line">        <span class="string">"Content-Type"</span>:<span class="string">"application/x-www-form-urlencoded; charset=UTF-8"</span>,</span><br><span class="line">        <span class="string">"Referer"</span>: <span class="string">"https://www.mosoteach.cn/web/index.php?c=passport"</span>,</span><br><span class="line">        <span class="string">"Accept-Encoding"</span>: <span class="string">"gzip, deflate"</span>,</span><br><span class="line">        <span class="string">"Accept-Language"</span>: <span class="string">"zh-CN,zh;q=0.9,en;q=0.8"</span></span><br><span class="line">&#125;</span><br><span class="line">    username=input(<span class="string">"请输入账号："</span>)</span><br><span class="line">    password=input(<span class="string">"请输入密码："</span>)</span><br><span class="line">    body=<span class="string">"account_name=&#123;0&#125;&amp;user_pwd=&#123;1&#125;&amp;remember_me=N"</span>.format(username,password)<span class="comment">#数据包</span></span><br><span class="line">    result1=requests.post(url1,headers=head1,data=body)<span class="comment">#发送请求，并将结果赋给result1</span></span><br><span class="line"></span><br><span class="line">    cookie=<span class="string">'''_uab_collina=158250218035462741369747; acw_tc=2f624a3015825021785831656e75d3fe19ff1615824f69523686f655e5c546; teachweb=e0ed1188bf4820414292f2c4fa4b54a6ba26d249; login_token=ed3bece2a19aeb459b92d334882f6ae5d669c4ab0b3a0c3ea5e9c40fce41cc79; SERVERID=c2bbad69fb4f12e536afd9f952c32498|1583987740|1583987499'''</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">    url2 = <span class="string">"https://www.mosoteach.cn/web/index.php?c=clazzcourse&amp;m=index"</span></span><br><span class="line">    head2 = &#123;</span><br><span class="line">        <span class="string">"Connection"</span>: <span class="string">"keep-alive"</span>,</span><br><span class="line">        <span class="string">"Accept"</span>: <span class="string">"text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3"</span>,</span><br><span class="line">        <span class="string">"Origin"</span>: <span class="string">"https://www.mosoteach.cn"</span>,</span><br><span class="line">        <span class="string">"X-Requested-With"</span>: <span class="string">"XMLHttpRequest"</span>,</span><br><span class="line">        <span class="string">"User-Agent"</span>: <span class="string">"Mozilla/5.0 (Windows NT 6.3; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/74.0.3729.169 Safari/537.36"</span>,</span><br><span class="line">        <span class="string">"Referer"</span>: <span class="string">"https://www.mosoteach.cn/web/index.php?c=passport"</span>,</span><br><span class="line">        <span class="string">"Accept-Encoding"</span>: <span class="string">"gzip, deflate"</span>,</span><br><span class="line">        <span class="string">"Accept-Language"</span>: <span class="string">"zh-CN,zh;q=0.9,en;q=0.8"</span>,</span><br><span class="line">        <span class="string">"Cookie"</span>: cookie</span><br><span class="line">    &#125;</span><br><span class="line">    result2 = requests.post(url=url2, headers=head2)</span><br><span class="line">    classid = re.findall(<span class="string">"data-id=\"(.*)\""</span>, result2.text)</span><br><span class="line">    print(<span class="string">"成功获取科目ID：%s"</span> % classid)</span><br><span class="line">    classid = input(<span class="string">"请输入你要刷的科目ID："</span>)</span><br><span class="line"></span><br><span class="line">    head3 = &#123;</span><br><span class="line">        <span class="string">"Connection"</span>: <span class="string">"keep-alive"</span>,</span><br><span class="line">        <span class="string">"Accept"</span>: <span class="string">"text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3"</span>,</span><br><span class="line">        <span class="string">"Origin"</span>: <span class="string">"https://www.mosoteach.cn"</span>,</span><br><span class="line">        <span class="string">"X-Requested-With"</span>: <span class="string">"XMLHttpRequest"</span>,</span><br><span class="line">        <span class="string">"User-Agent"</span>: <span class="string">"Mozilla/5.0 (Windows NT 6.3; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/74.0.3729.169 Safari/537.36"</span>,</span><br><span class="line">        <span class="string">"Accept-Encoding"</span>: <span class="string">"gzip, deflate"</span>,</span><br><span class="line">        <span class="string">"Accept-Language"</span>: <span class="string">"zh-CN,zh;q=0.9,en;q=0.8"</span>,</span><br><span class="line">        <span class="string">"Cookie"</span>: cookie,</span><br><span class="line">        <span class="string">"Refere"</span>: <span class="string">"https://www.mosoteach.cn/web/index.php?c=interaction&amp;m=index&amp;clazz_course_id=&#123;&#125;"</span>.format(classid)</span><br><span class="line">    &#125;</span><br><span class="line">    url3 = <span class="string">"https://www.mosoteach.cn/web/index.php?c=res&amp;m=index&amp;clazz_course_id=&#123;&#125;"</span>.format(classid.replace(<span class="string">"'"</span>, <span class="string">""</span>))</span><br><span class="line">    result3 = requests.get(url3, headers=head3)</span><br><span class="line">    viedoid = re.findall(<span class="string">"data-value=\"(.*)\""</span>, result3.text)  <span class="comment"># 这是用正则表达式提取资源id</span></span><br><span class="line">    print(viedoid)</span><br><span class="line"></span><br><span class="line">    url4 = <span class="string">"https://www.mosoteach.cn/web/index.php?c=res&amp;m=save_watch_to"</span></span><br><span class="line">    i = list(range(<span class="number">1</span>, len(viedoid), <span class="number">1</span>))</span><br><span class="line">    <span class="comment"># print(i)</span></span><br><span class="line">    <span class="keyword">for</span> k <span class="keyword">in</span> i:</span><br><span class="line">        <span class="comment">#if len(viedoid[k]) == len(viedoid[1]):  # 检测所提取的视频id长度是不是等于第一个视频的id长度，因为在提取的过程中后面有几个不是视频id，得把它去掉</span></span><br><span class="line">            head4 = &#123;</span><br><span class="line">                <span class="string">"Connection"</span>: <span class="string">"close"</span>,</span><br><span class="line">                <span class="string">"Content-Length"</span>: <span class="string">"141"</span>,</span><br><span class="line">                <span class="string">"Content-Type"</span>: <span class="string">"application/x-www-form-urlencoded; charset=UTF-8"</span>,</span><br><span class="line">                <span class="string">"Referer"</span>: <span class="string">"https://www.mosoteach.cn/web/index.php?c=res&amp;m=index&amp;clazz_course_id=&#123;&#125;"</span>.format(classid),</span><br><span class="line">                <span class="string">"Accept"</span>: <span class="string">"application/json, text/javascript, */*; q=0.01"</span>,</span><br><span class="line">                <span class="string">"Origin"</span>: <span class="string">"https://www.mosoteach.cn"</span>,</span><br><span class="line">                <span class="string">"X-Requested-With"</span>: <span class="string">"XMLHttpRequest"</span>,</span><br><span class="line">                <span class="string">"User-Agent"</span>: <span class="string">"Mozilla/5.0 (Windows NT 6.3; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/74.0.3729.169 Safari/537.36"</span>,</span><br><span class="line">                <span class="string">"Accept-Encoding"</span>: <span class="string">"gzip, deflate"</span>,</span><br><span class="line">                <span class="string">"Accept-Language"</span>: <span class="string">"zh-CN,zh;q=0.9,en;q=0.8"</span>,</span><br><span class="line">                <span class="string">"Cookie"</span>: cookie</span><br><span class="line">            &#125;</span><br><span class="line">            data4 = <span class="string">"clazz_course_id=&#123;&#125;&amp;res_id=&#123;&#125;&amp;watch_to=1200&amp;duration=1200¤t_watch_to=0"</span>.format(classid, viedoid[</span><br><span class="line">                k])  <span class="comment"># 这里的watch_to和duration要设置的大一些，如果设置小了，有些视频长度大于这个数值，你就会看不完</span></span><br><span class="line">            result4 = requests.post(url4, headers=head4, data=data4).json()</span><br><span class="line">            print(<span class="string">"视频%s的结果为:%s"</span> % (viedoid[k], result4))</span><br><span class="line"></span><br><span class="line">login()</span><br></pre></td></tr></table></figure>
