            <figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="keyword">import</span> smtplib</span><br><span class="line"><span class="keyword">from</span> email.mime.text <span class="keyword">import</span> MIMEText</span><br><span class="line"><span class="keyword">from</span> email.utils <span class="keyword">import</span> formataddr</span><br><span class="line"></span><br><span class="line">my_sender = <span class="string">'2580130642@qq.com'</span>  <span class="comment"># 发件人邮箱账号</span></span><br><span class="line">my_pass = <span class="string">'layfyooxyznediad'</span>  <span class="comment"># 发件人邮箱密码</span></span><br><span class="line">my_user = <span class="string">'1179840055@qq.com'</span>  <span class="comment"># 收件人邮箱账号，我这边发送给自己</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">mail</span><span class="params">()</span>:</span></span><br><span class="line">    ret = <span class="literal">True</span></span><br><span class="line">    <span class="keyword">try</span>:</span><br><span class="line">        <span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">5</span>):</span><br><span class="line">            msg = MIMEText(<span class="string">'这波暖心收下了😁'</span>, <span class="string">'plain'</span>, <span class="string">'utf-8'</span>)</span><br><span class="line">            msg[<span class="string">'Subject'</span>] = <span class="string">"考研必胜"</span>  <span class="comment"># 邮件的主题，也可以说是标题</span></span><br><span class="line"></span><br><span class="line">            server = smtplib.SMTP_SSL(<span class="string">"smtp.qq.com"</span>, <span class="number">465</span>)  <span class="comment"># 发件人邮箱中的SMTP服务器，端口是25</span></span><br><span class="line">            server.login(my_sender, my_pass)  <span class="comment"># 括号中对应的是发件人邮箱账号、邮箱密码</span></span><br><span class="line">            server.sendmail(my_sender, [my_user, ], msg.as_string())  <span class="comment"># 括号中对应的是发件人邮箱账号、收件人邮箱账号、发送邮件</span></span><br><span class="line">        server.quit()  <span class="comment"># 关闭连接</span></span><br><span class="line">    <span class="keyword">except</span> Exception:  <span class="comment"># 如果 try 中的语句没有执行，则会执行下面的 ret=False</span></span><br><span class="line">        ret = <span class="literal">False</span></span><br><span class="line">    <span class="keyword">return</span> ret</span><br><span class="line"></span><br><span class="line">ret = mail()</span><br><span class="line"><span class="keyword">if</span> ret:</span><br><span class="line">    print(<span class="string">"邮件发送成功"</span>)</span><br><span class="line"><span class="keyword">else</span>:</span><br><span class="line">    print(<span class="string">"邮件发送失败"</span>)</span><br></pre></td></tr></table></figure>
