        <div class="post-meta">
            <time class="post-time" title="2019-08-27 00:00:00" datetime="2019-08-26T16:00:00.000Z"  itemprop="datePublished">2019-08-27</time>

        <div class="post-content" id="post-content" itemprop="postContent">
            <p>操作浏览器，实现自动化</p>
<a id="more"></a>

<figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="keyword">from</span> selenium <span class="keyword">import</span> webdriver</span><br><span class="line"><span class="keyword">import</span> datetime</span><br><span class="line"><span class="keyword">import</span> time</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">login</span><span class="params">()</span>:</span></span><br><span class="line">    <span class="comment"># 打开淘宝登录页，并进行扫码登录</span></span><br><span class="line">    browser.get(<span class="string">"https://login.taobao.com/member/login.jhtml?redirectURL=http%3A%2F%2Fcart.taobao.com%2Fcart.htm"</span>)</span><br><span class="line">    time.sleep(<span class="number">15</span>)</span><br><span class="line">    browser.get(<span class="string">"https://cart.taobao.com/cart.htm"</span>)</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">buy</span><span class="params">(times, choose)</span>:</span></span><br><span class="line">    <span class="comment"># 点击购物车里全选按钮</span></span><br><span class="line">    <span class="keyword">while</span> <span class="literal">True</span>:</span><br><span class="line">        now = datetime.datetime.now().strftime(<span class="string">'%Y-%m-%d %H:%M:%S.%f'</span>)</span><br><span class="line">        <span class="comment"># 对比时间，时间到的话就点击结算</span></span><br><span class="line">        <span class="keyword">if</span> now &gt; times:                 <span class="comment">#bug:00:00:00   是特殊点</span></span><br><span class="line"></span><br><span class="line">            <span class="keyword">if</span> choose == <span class="number">1</span>:</span><br><span class="line">                <span class="keyword">while</span> <span class="literal">True</span>:         <span class="comment">#一直循环直到元素出现</span></span><br><span class="line">                    <span class="keyword">try</span>:</span><br><span class="line">                        <span class="keyword">if</span> browser.find_element_by_id(<span class="string">"J_SelectAll1"</span>):</span><br><span class="line">                            browser.find_element_by_id(<span class="string">"J_SelectAll1"</span>).click()</span><br><span class="line">                            print(<span class="string">"全选点击成功"</span>)</span><br><span class="line">                            <span class="keyword">break</span></span><br><span class="line">                    <span class="keyword">except</span>:</span><br><span class="line">                        print(<span class="string">"找不到全选按钮"</span>)</span><br><span class="line">            <span class="comment"># 点击结算按钮</span></span><br><span class="line">            time.sleep(<span class="number">0.15</span>)</span><br><span class="line">            <span class="keyword">while</span> <span class="literal">True</span>:</span><br><span class="line">                <span class="keyword">try</span>:</span><br><span class="line">                    <span class="keyword">if</span> browser.find_element_by_id(<span class="string">"J_Go"</span>):</span><br><span class="line">                        browser.find_element_by_id(<span class="string">"J_Go"</span>).click()</span><br><span class="line">                        print(<span class="string">"结算成功"</span>)</span><br><span class="line">                        <span class="keyword">break</span></span><br><span class="line">                <span class="keyword">except</span>:</span><br><span class="line">                    <span class="keyword">pass</span></span><br><span class="line"></span><br><span class="line">            <span class="keyword">while</span> <span class="literal">True</span>:</span><br><span class="line">                <span class="keyword">try</span>:</span><br><span class="line">                    <span class="keyword">if</span> browser.find_element_by_link_text(<span class="string">'提交订单'</span>):</span><br><span class="line">                        browser.find_element_by_link_text(<span class="string">'提交订单'</span>).click()</span><br><span class="line">                        <span class="keyword">break</span></span><br><span class="line">                <span class="keyword">except</span>:</span><br><span class="line">                    <span class="keyword">pass</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">            <span class="keyword">while</span> <span class="literal">True</span>:</span><br><span class="line">                <span class="keyword">try</span>:</span><br><span class="line">                    pswInput = browser.find_element_by_id(<span class="string">'payPassword_rsainput'</span>)</span><br><span class="line">                    pswInput.send_keys(<span class="string">'999999'</span>)</span><br><span class="line">                    J_authSubmit = browser.find_element_by_id(<span class="string">'J_authSubmit'</span>)</span><br><span class="line">                    J_authSubmit.click()</span><br><span class="line">                    print(<span class="string">"支付成功"</span>)</span><br><span class="line">                    <span class="keyword">break</span></span><br><span class="line">                <span class="keyword">except</span>:</span><br><span class="line">                    <span class="keyword">pass</span></span><br><span class="line">            time.sleep(<span class="number">0.09</span>)</span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> __name__ == <span class="string">"__main__"</span>:</span><br><span class="line">    times = <span class="string">"2018-12-12 08:51:00.000000"</span></span><br><span class="line">    browser = webdriver.Chrome()</span><br><span class="line">    browser.maximize_window()</span><br><span class="line">    login()</span><br><span class="line">    buy(times, <span class="number">1</span>)</span><br></pre></td></tr></table></figure>
