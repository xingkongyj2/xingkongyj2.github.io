<h2 id="版本1"><a href="#版本1" class="headerlink" title="版本1"></a>版本1</h2><figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;iostream&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;list&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> <span class="built_in">std</span>;</span><br><span class="line"></span><br><span class="line"><span class="keyword">int</span> nSolu=<span class="number">0</span>;</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">struct</span> <span class="title">Queen</span>&#123;</span></span><br><span class="line">    <span class="keyword">int</span> x,y;</span><br><span class="line">    Queen(<span class="keyword">int</span> xx,<span class="keyword">int</span> yy):x(xx),y(yy)&#123; &#125;;</span><br><span class="line">    <span class="keyword">bool</span> <span class="keyword">operator</span>==(<span class="keyword">const</span> Queen &amp; q)</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="keyword">return</span> (x==q.x)||(y==q.y)||(x+y==q.x+q.y)||(x-y==q.x-q.y);</span><br><span class="line">    &#125;;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="keyword">template</span>&lt;<span class="class"><span class="keyword">class</span> <span class="title">T</span>&gt;</span></span><br><span class="line"><span class="class"><span class="title">struct</span> <span class="title">Stack</span>&#123;</span>           <span class="comment">//由链表s实现的堆</span></span><br><span class="line">    <span class="built_in">list</span>&lt;T&gt; li;</span><br><span class="line">    </span><br><span class="line">    <span class="function"><span class="keyword">void</span> <span class="title">push</span><span class="params">(T queen)</span></span></span><br><span class="line"><span class="function">    </span>&#123;</span><br><span class="line">        li.push_back(queen);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="function">T <span class="title">pop</span><span class="params">()</span></span></span><br><span class="line"><span class="function">    </span>&#123;</span><br><span class="line">        T queen=li.back();</span><br><span class="line">        li.pop_back();</span><br><span class="line">        <span class="keyword">return</span> queen;</span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">    <span class="function"><span class="keyword">int</span> <span class="title">find</span><span class="params">(T queen)</span></span></span><br><span class="line"><span class="function">    </span>&#123;</span><br><span class="line">        <span class="built_in">list</span>&lt;Queen&gt;::iterator i;</span><br><span class="line">        <span class="keyword">int</span> sum=<span class="number">-1</span>;</span><br><span class="line">        <span class="keyword">for</span>(i=li.<span class="built_in">begin</span>();i!=li.<span class="built_in">end</span>();i++)</span><br><span class="line">        &#123;</span><br><span class="line">            sum++;</span><br><span class="line">            <span class="keyword">if</span>(*i==queen)</span><br><span class="line">                <span class="keyword">break</span>;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">if</span>(i==li.<span class="built_in">end</span>())</span><br><span class="line">            sum=<span class="number">-1</span>;</span><br><span class="line">        <span class="keyword">return</span> sum;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="function"><span class="keyword">int</span> <span class="title">size</span><span class="params">()</span></span></span><br><span class="line"><span class="function">    </span>&#123;</span><br><span class="line">        <span class="built_in">list</span>&lt;Queen&gt;::iterator i;</span><br><span class="line">        <span class="keyword">int</span> sum=<span class="number">0</span>;</span><br><span class="line">        <span class="keyword">for</span>(i=li.<span class="built_in">begin</span>();i!=li.<span class="built_in">end</span>();i++)</span><br><span class="line">            sum++;</span><br><span class="line">        <span class="keyword">return</span> sum;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">placeQueens</span><span class="params">(<span class="keyword">int</span> N)</span>   <span class="comment">//N皇后</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    Stack&lt;Queen&gt; solu;</span><br><span class="line">    <span class="function">Queen <span class="title">q</span><span class="params">(<span class="number">0</span>,<span class="number">0</span>)</span></span>;               <span class="comment">//初始化</span></span><br><span class="line">    <span class="keyword">while</span> (q.x&gt;<span class="number">0</span> || q.y&lt;N)</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="keyword">if</span>(solu.<span class="built_in">size</span>()&gt;=N || q.y&gt;=N)        <span class="comment">//solu.size()&gt;=N:如果堆里面皇后个数达到了N个说明已经找到了一种j解决方案，然后继续找背的方案                                           //q.y&gt;=N:出界了</span></span><br><span class="line">        &#123;</span><br><span class="line">            q=solu.pop();                   <span class="comment">//回溯，然后把相应的Y加1</span></span><br><span class="line">            q.y++;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">else</span></span><br><span class="line">        &#123;</span><br><span class="line">            <span class="keyword">while</span> (q.y&lt;N &amp;&amp; solu.<span class="built_in">find</span>(q)&gt;=<span class="number">0</span>) q.y++;     <span class="comment">//退出循环只有两种情况：在界限内找到了可以放置的点   出界（没有可以放置的点）</span></span><br><span class="line">            <span class="keyword">if</span>(q.y&lt;N)                       <span class="comment">//若q.y小于N说明找到了f放置点保存位置，否则就是出界</span></span><br><span class="line">            &#123;</span><br><span class="line">                solu.push(q);</span><br><span class="line">                <span class="keyword">if</span>(solu.<span class="built_in">size</span>()&gt;=N)          <span class="comment">//当堆栈==N说明满了，找到一种解决方案</span></span><br><span class="line">                &#123;</span><br><span class="line">                    nSolu++;</span><br><span class="line">                &#125;</span><br><span class="line">                q.x++;                      <span class="comment">//去寻找下一个皇后的位置</span></span><br><span class="line">                q.y=<span class="number">0</span>;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="comment">//cout&lt;&lt;solu.size()&lt;&lt;endl;</span></span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">while</span>(<span class="number">1</span>)</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="keyword">int</span> n=<span class="number">0</sp <h2 id="版本2"><a href="#版本2" class="headerlink" title="版本2"></a>版本2</h2><figure class="highlight c++"><table><tr><td class="code"><pre><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;iostream&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;stack&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;vector&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;algorithm&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> <span class="built_in">std</span>;</span><br><span class="line"></span><br><span class="line"><span class="keyword">int</span> nSolu=<span class="number">0</span>;</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">struct</span> <span class="title">Queen</span>&#123;</span></span><br><span class="line">    <span class="keyword">int</span> x,y;</span><br><span class="line">    Queen():x(<span class="number">0</span>),y(<span class="number">0</span>)&#123; &#125;;</span><br><span class="line">    Queen(<span class="keyword">int</span> xx,<span class="keyword">int</span> yy):x(xx),y(yy)&#123; &#125;;</span><br><span class="line">    <span class="keyword">bool</span> <span class="keyword">operator</span>==(<span class="keyword">const</span> Queen &amp; q)</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="keyword">return</span> (x==q.x)||(y==q.y)||(x+y==q.x+q.y)||(x-y==q.x-q.y);</span><br><span class="line">    &#125;;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="built_in">vector</span>&lt;Queen&gt; qs;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">findfind</span><span class="params">(Queen q)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">bool</span> flag=<span class="literal">true</span>;</span><br><span class="line">    <span class="built_in">vector</span>&lt;Queen&gt;::iterator i;</span><br><span class="line">    <span class="keyword">for</span> (i=qs.<span class="built_in">begin</span>(); i!=qs.<span class="built_in">end</span>(); i++)</span><br><span class="line">        <span class="keyword">if</span>(*i==q)</span><br><span class="line">            <span class="keyword">break</span>;</span><br><span class="line">    <span class="keyword">if</span>(i==qs.<span class="built_in">end</span>())</span><br><span class="line">        flag=<span class="literal">false</span>;</span><br><span class="line">    <span class="keyword">return</span> flag;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">placeQueens</span><span class="params">(<span class="keyword">int</span> N)</span>   <span class="comment">//N皇后</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    qs.<span class="built_in">clear</span>();</span><br><span class="line">    <span class="built_in">stack</span>&lt;Queen&gt; solu;</span><br><span class="line">    <span class="function">Queen <span class="title">q</span><span class="params">(<span class="number">0</span>,<span class="number">0</span>)</span></span>;               <span class="comment">//初始化</span></span><br><span class="line">    <span class="keyword">while</span> (q.x&gt;<span class="number">0</span> || q.y&lt;N)</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="keyword">if</span>(solu.<span class="built_in">size</span>()&gt;=N || q.y&gt;=N)        <span class="comment">//solu.size()&gt;=N:如果堆里面皇后个数达到了N个说明已经找到了一种j解决方案，然后继续找背的方案                                         //q.y&gt;=N:出界了</span></span><br><span class="line">        &#123;</span><br><span class="line">            q=solu.top();                   <span class="comment">//回溯，然后把相应的Y加1</span></span><br><span class="line">            solu.pop();</span><br><span class="line">            qs.pop_back();</span><br><span class="line">            q.y++;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">else</span></span><br><span class="line">        &#123;</span><br><span class="line">            <span class="keyword">while</span> (q.y&lt;N &amp;&amp; findfind(q)) q.y++;     <span class="comment">//退出循环只有两种情况：在界限内找到了可以放置的点   出界（没有可以放置的点）</span></span><br><span class="line">            <span class="keyword">if</span>(q.y&lt;N)                       <span class="comment">//若q.y小于N说明找到了f放置点保存位置，否则就是出界</span></span><br><span class="line">            &#123;</span><br><span class="line">                solu.push(q);</span><br><span class="line">                qs.push_back(q);</span><br><span class="line">                <span class="keyword">if</span>(solu.<span class="built_in">size</span>()&gt;=N)          <span class="comment">//当堆栈==N说明满了，找到一种解决方案</span></span><br><span class="line">                    nSolu++;</span><br><span class="line">                q.x++;                      <span class="comment">//去寻找下一个皇后的位置</span></span><br><span class="line">                q.y=<span class="number">0</span>;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        </span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">while</span>(<span class="number">1</span>)</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="keyword">int</span> n=<span class="number">0</span>;</span><br><span class="line">        <span class="built_in">scanf</span>(<span class="string">"%d"</span>,&amp;n);</span><br><span class="line">        <span class="keyword">if</span>(n==<span class="number">0</span>)</span><br><span class="line">            <span class="keyword">break</span>;</span><br><span class="line">        placeQueens(n);</span><br><span class="line">        <span class="built_in">cout</span>&lt;&lt;nSolu&lt;&lt;<span class="built_in">endl</span>;</span><br><span class="line">        nSolu=<span class="number">0</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
