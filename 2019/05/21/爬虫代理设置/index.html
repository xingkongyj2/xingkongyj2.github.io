<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> random</span><br><span class="line"><span class="keyword">import</span> requests</span><br><span class="line"><span class="keyword">from</span> bs4 <span class="keyword">import</span> BeautifulSoup</span><br><span class="line"></span><br><span class="line">headers = &#123;<span class="string">'User-Agent'</span>: <span class="string">'Mozilla/5.0'</span>&#125;</span><br><span class="line">proxies = &#123;</span><br><span class="line">    <span class="string">'http'</span>:<span class="string">'http://117.135.153.10:80'</span></span><br><span class="line">&#125;                                 <span class="comment">#注意http 和 https</span></span><br><span class="line"><span class="comment">#'http':'http://125.74.14.73:80'</span></span><br><span class="line"><span class="comment">#'http':'http://124.89.174.199:8060'</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">getProxies</span><span class="params">()</span>:</span></span><br><span class="line">    url=<span class="string">'https://www.kuaidaili.com/free/intr/1/'</span></span><br><span class="line">    <span class="keyword">try</span>:</span><br><span class="line">        r = requests.get(url, headers=headers)   <span class="comment">#设置代理 设置时间</span></span><br><span class="line">        r.raise_for_status()</span><br><span class="line">        <span class="keyword">if</span>(url.find(<span class="string">'https://item.jd.com/'</span>)!=<span class="number">-1</span>):</span><br><span class="line">            r.encoding =<span class="string">'gbk'</span>;</span><br><span class="line">        <span class="keyword">else</span>:r.encoding =<span class="string">'utf-8'</span>;</span><br><span class="line">    <span class="keyword">except</span>:</span><br><span class="line">        print(<span class="string">"爬取失败"</span>)</span><br><span class="line">    soup = BeautifulSoup(r.text, <span class="string">"html.parser"</span>)</span><br><span class="line">    ipLists = soup.findAll(<span class="string">'tbody'</span>,limit=<span class="number">1</span>)</span><br><span class="line">    ipLists=ipLists[<span class="number">0</span>].findAll(<span class="string">'tr'</span>)</span><br><span class="line">    ipListsRandom=random.randint(<span class="number">0</span>,<span class="number">14</span>)</span><br><span class="line">    proxies[<span class="string">'http'</span>]=<span class="string">'http://'</span>+ipLists[ipListsRandom].contents[<span class="number">1</span>].string+<span class="string">':'</span>+ipLists[ipListsRandom].contents[<span class="number">3</span>].string</span><br><span class="line">    <span class="keyword">return</span> proxies</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">cheakProxies</span><span class="params">()</span>:</span></span><br><span class="line">    <span class="comment"># 用来检测代理是否成功</span></span><br><span class="line">    <span class="keyword">try</span>:</span><br><span class="line">        r = requests.get(<span class="string">'http://icanhazip.com'</span>, headers=headers, proxies=proxies)</span><br><span class="line">        r.raise_for_status()</span><br><span class="line">    <span class="keyword">except</span>:</span><br><span class="line">        print(<span class="string">"代理失败"</span>)</span><br><span class="line">    print(r.text)</span><br><span class="line">    print(<span class="string">'代理成功'</span>)</span><br><span class="line"></span><br><span class="line">cheakProxies()</span><br></pre></td></tr></table></figure>
