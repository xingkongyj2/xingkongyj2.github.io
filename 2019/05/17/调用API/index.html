   data=&#123;</span><br><span class="line">        <span class="string">"value1"</span>: <span class="string">"这是一条测试\\n当前温度为"</span>+str(temperature)+<span class="string">'C'</span></span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">try</span>:</span><br><span class="line">        kv=&#123;<span class="string">'user-agent'</span>:<span class="string">'Mozilla/5.0'</span>&#125;</span><br><span class="line">        r=requests.get(url,headers=kv,json=data)</span><br><span class="line">        r.raise_for_status()</span><br><span class="line">        r.encoding=r.apparent_encoding;</span><br><span class="line">        print(r.text)</span><br><span class="line">    <span class="keyword">except</span>:</span><br><span class="line">        print(<span class="string">"爬取失败"</span>)</span><br><span class="line"></span><br><span class="line">text=getHtml()</span><br><span class="line"><span class="keyword">if</span>(text!=<span class="string">""</span>):</span><br><span class="line">    text=json.loads(text);</span><br><span class="line">    temperature=float(text[<span class="string">'records'</span>][<span class="number">0</span>][<span class="string">'fields'</span>][<span class="string">'test'</span>][<span class="number">12</span>:])</span><br><span class="line">    pushbots(temperature)</span><br><span class="line">    <span class="comment">#print(temperature)</span></span><br></pre></td></tr></table></figure>
