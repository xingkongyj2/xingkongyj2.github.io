                    <p>利用python进行对excel创建、数据去重等操作</p>
<a id="more"></a>

<h2 id="创建excel表格"><a href="#创建excel表格" class="headerlink" title="创建excel表格"></a>创建excel表格</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="keyword">import</span> openpyxl</span><br><span class="line"></span><br><span class="line">workbook=openpyxl.Workbook()     <span class="comment">#创建文件</span></span><br><span class="line">worksheet = workbook.active         <span class="comment">#激活表格1</span></span><br><span class="line">worksheet.title=<span class="string">"mySheet"</span></span><br><span class="line"></span><br><span class="line">worksheet.cell(<span class="number">1</span>, <span class="number">1</span>, <span class="string">"askgdajds"</span>)</span><br><span class="line"></span><br><span class="line">workbook.save(filename=<span class="string">'/Users/xingkong2/Desktop/haha.xlsx'</span>)</span><br></pre></td></tr></table></figure>



<h2 id="json数据写入excel"><a href="#json数据写入excel" class="headerlink" title="json数据写入excel"></a>json数据写入excel</h2><blockquote>
<p>需要创建新表</p>
</blockquote>
<figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="keyword">import</span> json</span><br><span class="line"><span class="keyword">import</span> openpyxl</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#鄂州 黄冈 黄石 荆门 十堰 咸宁 襄阳 孝感 宜昌</span></span><br><span class="line"></span><br><span class="line">position=<span class="string">'长沙'</span></span><br><span class="line"></span><br><span class="line">path=<span class="string">'/Users/xingkong2/Desktop/湖南/'</span>+position+<span class="string">'/content2.json'</span></span><br><span class="line">path2=<span class="string">'/Users/xingkong2/Desktop/湖南/'</span>+position+<span class="string">'/all.xlsx'</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">with</span> open(path,  encoding=<span class="string">'utf-8-sig'</span>) <span class="keyword">as</span> f:</span><br><span class="line">    data = json.load(f)</span><br><span class="line"></span><br><span class="line">rows=data[<span class="string">'dataPack'</span>][<span class="string">'rows'</span>]</span><br><span class="line"></span><br><span class="line">allInfo=[]</span><br><span class="line">info=[]</span><br><span class="line"></span><br><span class="line"><span class="keyword">for</span> row <span class="keyword">in</span> rows:</span><br><span class="line">    info.append(row[<span class="string">'FNAME'</span>])</span><br><span class="line">    info.append(row[<span class="string">'FC47'</span>])</span><br><span class="line">    info.append(row[<span class="string">'FTEL'</span>])</span><br><span class="line">    info.append(row[<span class="string">'FPHONE'</span>])</span><br><span class="line">    allInfo.append(info)</span><br><span class="line">    info=[]</span><br><span class="line"></span><br><span class="line"><span class="comment">#当表格已经存在时，不需要再创建</span></span><br><span class="line"><span class="string">'''</span></span><br><span class="line"><span class="string">workbook=openpyxl.Workbook()     #创建文件         </span></span><br><span class="line"><span class="string">worksheet = workbook.active         #激活表格1</span></span><br><span class="line"><span class="string">worksheet.title="Sheet1"</span></span><br><span class="line"><span class="string">workbook.save(filename='/Users/xingkong2/Desktop/table.xlsx')</span></span><br><span class="line"><span class="string">'''</span></span><br><span class="line"></span><br><span class="line">workbook=openpyxl.load_workbook(path2)</span><br><span class="line">worksheet=workbook.worksheets[<span class="number">0</span>]</span><br><span class="line"></span><br><span class="line"><span class="keyword">for</span> info <span class="keyword">in</span> allInfo:</span><br><span class="line">    worksheet.append(info)    <span class="comment">#添加已经存在的表格</span></span><br><span class="line"></span><br><span class="line">workbook.save(filename=path2)</span><br><span class="line">print(position+<span class="string">"将json数据写入Excel成功"</span>)</span><br></pre></td></tr></table></figure>



<h2 id="excel数据去重"><a href="#excel数据去重" class="headerlink" title="excel数据去重"></a>excel数据去重</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="keyword">import</span> pandas <span class="keyword">as</span> pd</span><br><span class="line"></span><br><span class="line">positions=[<span class="string">'安阳'</span>, <span class="string">'鹤壁'</span>, <span class="string">'济源'</span>, <span class="string">'焦作'</span>, <span class="string">'开封'</span>, <span class="string">'洛阳'</span>, <span class="string">'漯河'</span>, <span class="string">'南阳'</span>, <span class="string">'平顶山'</span>, <span class="string">'濮阳'</span>, <span class="string">'三门峡'</span>,<span class="string">'商丘'</span>,<span class="string">'新乡'</span>,<span class="string">'信阳'</span>,<span class="string">'许昌'</span>,<span class="string">'郑州'</span>,<span class="string">'周口'</span>,<span class="string">'驻马店'</span>]</span><br><span class="line"></span><br><span class="line"><span class="keyword">for</span> position <span class="keyword">in</span> positions:</span><br><span class="line"></span><br><span class="line">    path=<span class="string">'/Users/xingkong2/Desktop/河南/'</span>+position+<span class="string">'/all.xlsx'</span></span><br><span class="line"></span><br><span class="line">    path2=<span class="string">'/Users/xingkong2/Desktop/河南/'</span>+position+<span class="string">'/'</span>+position+<span class="string">'唯一化.xlsx'</span></span><br><span class="line"></span><br><span class="line">    <span class="comment"># 读取Excel中Sheet1中的数据</span></span><br><span class="line">    data = pd.DataFrame(pd.read_excel(path, <span class="string">'Sheet1'</span>))</span><br><span class="line"></span><br><span class="line">    <span class="comment"># 查看基于[物品]列去除重复行的数据</span></span><br><span class="line">    wp = data.drop_duplicates([<span class="string">'客户名称'</span>])</span><br><span class="line"></span><br><span class="line">    <span class="comment"># 将去除重复行的数据输出到excel表中</span></span><br><span class="line">    wp.to_excel(path)</span><br><span class="line">    print(position+<span class="string">"去重完成"</span>)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#positions=['安阳', '鹤壁', '济源', '焦作', '开封', '洛阳', '漯河', '南阳', '平顶山', '濮阳', '三门峡','商丘','新乡','信阳','许昌','郑州','周口','驻马店']</span></span><br><span class="line"><span class="comment">#positions=['常德', '郴州', '衡阳', '怀化', '娄底', '邵阳', '湘潭', '益阳', '永州', '岳阳', '张家界','长沙','株洲']</span></span><br></pre></td></tr></table></figure>
