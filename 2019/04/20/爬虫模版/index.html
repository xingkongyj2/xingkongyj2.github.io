    <div class="post-card">
        <h1 class="post-card-title">爬虫模版</h1>
        <div class="post-meta">
            <time class="post-time" title="2019-04-20 00:00:00" datetime="2019-04-19T16:00:00.000Z"  itemprop="datePublished">2019-04-20</time>

            
	<ul class="article-category-list"><li class="article-category-list-item"><a class="article-category-list-link" href="/categories/%E7%88%AC%E8%99%AB/">爬虫</a></li></ul>

        <div class="post-content" id="post-content" itemprop="postContent">
            <p>常用的爬虫请求模版。爬取图片、使用正则、搜索爬取～</p>
<a id="more"></a>

<h2 id="普通请求"><a href="#普通请求" class="headerlink" title="普通请求"></a>普通请求</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="comment">#r.request.headers 查看请求信息</span></span><br><span class="line"><span class="keyword">import</span> requests</span><br><span class="line">url=<span class="string">'https://api.airtable.com/v0/appU9QT7BUOev35GR/iDM?maxRecords=3&amp;view=Grid%20view'</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">try</span>:</span><br><span class="line">    kv=&#123;<span class="string">'user-agent'</span>:<span class="string">'Mozilla/5.0'</span>,</span><br><span class="line">        <span class="string">'Authorization'</span>:<span class="string">'Bearer key2lrnDfzwxyrgOH'</span>&#125;</span><br><span class="line">    r=requests.get(url,headers=kv)</span><br><span class="line">    r.raise_for_status()</span><br><span class="line">    r.encoding=r.apparent_encoding;</span><br><span class="line">    print(r.text)</span><br><span class="line"></span><br><span class="line"><span class="keyword">except</span>:</span><br><span class="line">    print(<span class="string">"爬取失败"</span>)</span><br></pre></td></tr></table></figure>

<h2 id="搜索"><a href="#搜索" class="headerlink" title="搜索"></a>搜索</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="keyword">import</span> requests</span><br><span class="line">keyword=<span class="string">"python"</span></span><br><span class="line">headers = &#123;</span><br><span class="line"><span class="string">"User-Agent"</span>: <span class="string">"Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_1) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/71.0.3578.98 Safari/537.36"</span>,</span><br><span class="line">    <span class="string">"Cookie"</span>:<span class="string">'sessionid=wplv193aex84mpp1sknyhj27bd3gdtmk; csrftoken=FJbuCEPObUYV3lsta85VKX6tD8Hz8LaDLAnowtR6Qj9TXh5n4NFjKvX0JHmX3MOX; Hm_lvt_375aa6d601368176e50751c1c6bf0e82=1544436946,1545919724,1546001336; Hm_lpvt_375aa6d601368176e50751c1c6bf0e82=1546005348'</span>,</span><br><span class="line">&#125;</span><br><span class="line">proxies = &#123;</span><br><span class="line"></span><br><span class="line">&#125;</span><br><span class="line"><span class="keyword">try</span>:</span><br><span class="line">    r=requests.get(<span class="string">'http://readfree.me/search/?q=%E7%AE%97%E6%B3%95%E5%AF%BC%E8%AE%BA'</span>,headers=headers)</span><br><span class="line">    r.raise_for_status()</span><br><span class="line">    print(r.text)</span><br><span class="line"><span class="keyword">except</span>:</span><br><span class="line">    print(<span class="string">"爬取失败"</span>)</span><br></pre></td></tr></table></figure>



<h2 id="爬取图片"><a href="#爬取图片" class="headerlink" title="爬取图片"></a>爬取图片</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="keyword">import</span> requests</span><br><span class="line"><span class="keyword">import</span> os</span><br><span class="line"></span><br><span class="line">url=<span class="string">"http://img11.360buyimg.com/mobilecms/s140x140_jfs/t1/5681/11/8922/341224/5baaf491E3d93e68a/78dd0833dd51a8ec.jpg"</span></span><br><span class="line">root=<span class="string">"‎⁨desktop⁩//"</span></span><br><span class="line">path=root+url.split(<span class="string">'/'</span>)[<span class="number">-1</span>]        <span class="comment">#这里的地址是相对路径</span></span><br><span class="line"><span class="keyword">try</span>:</span><br><span class="line">    <span class="keyword">if</span> <span class="keyword">not</span> os.path.exists(root):    <span class="comment">#如果目录不存在就创建一个</span></span><br><span class="line">        os.mkdir(root)          </span><br><span class="line">    <span class="keyword">if</span> <span class="keyword">not</span> os.path.exists(path):</span><br><span class="line">        r=requests.get(url)</span><br><span class="line">        <span class="keyword">with</span> open(path,<span class="string">'wb'</span>) <span class="keyword">as</span> f:      <span class="comment">#打开文件给文件标识符f</span></span><br><span class="line">            f.write(r.content)          <span class="comment">#把r的内容写入</span></span><br><span class="line">            f.close</span><br><span class="line">            print(<span class="string">"文件保存成功"</span>)</span><br><span class="line">            print(path)</span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        print(<span class="string">"文件已经存在"</span>)</span><br><span class="line"><span class="keyword">except</span>:</span><br><span class="line">    print(<span class="string">"爬取失败"</span>)</span><br></pre></td></tr></table></figure>

<h2 id="正则表达式"><a href="#正则表达式" class="headerlink" title="正则表达式"></a>正则表达式</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="keyword">import</span> re</span><br><span class="line"></span><br><span class="line">pal=re.compile(<span class="string">'imooc'</span>)        <span class="comment">#r说明匹配与单括号中一样的字符串，推荐使用</span></span><br><span class="line">mal=pal.match(<span class="string">'imooc hah'</span>)      <span class="comment">#拿定义好的pal与字符串进行匹配</span></span><br><span class="line">mal.group()</span><br><span class="line"> </span><br><span class="line">ma=re.match(<span class="string">r'[[\w]]'</span>,<span class="string">'[a]'</span>)  <span class="comment">#因为[]是正则的一个字符集，所以匹配需要转义</span></span><br><span class="line"></span><br><span class="line">str1=<span class="string">'hahahah=1000'</span></span><br><span class="line">info=re.search(<span class="string">r'\d+'</span>,str1) <span class="comment">#在字符串str1中找数字   search只能匹配一个</span></span><br><span class="line"></span><br><span class="line">str2=<span class="string">'hahahah=1000，heheh=10000'</span></span><br><span class="line">info=re.findall(<span class="string">r'\d+'</span>,str2) <span class="comment">#在字符串str2中找数字   findall匹配多个，返回一个列表</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">add1</span><span class="params">(match)</span>:</span></span><br><span class="line">    val=match.group()</span><br><span class="line">    num =int(val)+<span class="number">1</span></span><br><span class="line">    <span class="keyword">return</span> str(num);</span><br><span class="line"></span><br><span class="line">str1=<span class="string">'hahahah=999'</span></span><br><span class="line">info=re.sub(<span class="string">r'\d+'</span>,add1,str3)   <span class="comment">#将匹配到的用add1替换</span></span><br><span class="line"></span><br><span class="line">str4=<span class="string">'c c++:java'</span></span><br><span class="line">re.split(<span class="string">r' |:'</span>,str4);   <span class="comment">#将空格和：为标志对字符串分隔</span></span><br></pre></td></tr></table></figure>
