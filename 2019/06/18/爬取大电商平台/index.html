    <div class="post-card">
        <h1 class="post-card-title">爬大电商平台</h1>
        <div class="post-meta">
            <time class="post-time" title="2019-06-18 00:00:00" datetime="2019-06-17T16:00:00.000Z"  itemprop="datePublished">2019-06-18</time>

            
	<ul class="article-category-list"><li class="article-category-list-item"><a class="article-category-list-link" href="/categories/%E7%88%AC%E8%99%AB/">爬虫</a></li></ul>

        <div class="post-content" id="post-content" itemprop="postContent">
            <p>根据搜索爬天猫、京东、当当、孔夫子的书籍信息</p>
<a id="more"></a>

<h2 id="天猫"><a href="#天猫" class="headerlink" title="天猫"></a>天猫</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="keyword">import</span> requests</span><br><span class="line"><span class="keyword">from</span> bs4 <span class="keyword">import</span> BeautifulSoup</span><br><span class="line"><span class="keyword">import</span> bs4</span><br><span class="line"></span><br><span class="line">proxies = &#123;</span><br><span class="line">    <span class="string">'http'</span>:<span class="string">'&lt;http://117.135.153.10:80&gt;'</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">headers = &#123;<span class="string">'User-Agent'</span>: <span class="string">'Mozilla/5.0'</span>&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">getHTMLText</span><span class="params">(url)</span>:</span>   <span class="comment">#通用 获取网页信息</span></span><br><span class="line">    <span class="keyword">try</span>:</span><br><span class="line">        r = requests.get(url, headers=headers,proxies=proxies)   <span class="comment">#设置代理 设置时间</span></span><br><span class="line">        r.raise_for_status()</span><br><span class="line">        r.encoding =<span class="string">'gbk'</span>;</span><br><span class="line">    <span class="keyword">except</span>:</span><br><span class="line">        print(<span class="string">"淘宝搜索失败"</span>)</span><br><span class="line">        <span class="keyword">return</span> <span class="string">""</span></span><br><span class="line">    <span class="keyword">return</span> r.text</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">getUnivList</span><span class="params">(allUnivList,text,Limit)</span>:</span></span><br><span class="line"></span><br><span class="line">    bookInfo = []  <span class="comment"># 每件商品的信息 0价格  1  名字 2 评论数量   3图片     4 店名   5 平台  6物品详细界面 7筛选  8商品ID</span></span><br><span class="line"></span><br><span class="line">    soup = BeautifulSoup(text, <span class="string">"html.parser"</span>)         <span class="comment">#直接获取每一条数据的全部信息</span></span><br><span class="line">    books = soup.findAll(<span class="string">'div'</span>, class_=<span class="string">'product'</span>, limit=Limit)  <span class="comment"># 获取书本ID</span></span><br><span class="line">    length = len(books)</span><br><span class="line">    <span class="keyword">if</span> (length == <span class="number">0</span>): <span class="keyword">return</span> <span class="string">""</span>    <span class="comment">#如果搜索为空就直接返回</span></span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span> book <span class="keyword">in</span> books:</span><br><span class="line">        <span class="keyword">if</span> (isinstance(book, bs4.element.Tag)):</span><br><span class="line">            productPrice = book.findAll(<span class="string">'p'</span>, class_=<span class="string">'productPrice'</span>) <span class="comment">#价格</span></span><br><span class="line">            bookInfo.append(str(productPrice[<span class="number">0</span>].text)[<span class="number">2</span>:])</span><br><span class="line"></span><br><span class="line">            productTitle = book.findAll(<span class="string">'p'</span>, class_=<span class="string">'productTitle'</span>)  <span class="comment"># 名字   限制22个字</span></span><br><span class="line">            <span class="keyword">if</span> (len(productTitle)):</span><br><span class="line">                <span class="keyword">if</span> (len(str(productTitle[<span class="number">0</span>].text.strip())) &lt;= <span class="number">22</span>):</span><br><span class="line">                    bookInfo.append(str(productTitle[<span class="number">0</span>].text.strip()))</span><br><span class="line">                <span class="keyword">else</span>:</span><br><span class="line">                    bookInfo.append(str(productTitle[<span class="number">0</span>].text.strip())[<span class="number">0</span>:<span class="number">22</span>] + <span class="string">"..."</span>)</span><br><span class="line">            <span class="keyword">else</span>:</span><br><span class="line">                bookInfo.append(<span class="string">''</span>)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">            productStatus = book.findAll(<span class="string">'p'</span>, class_=<span class="string">'productStatus'</span>)  <span class="comment"># 评价</span></span><br><span class="line">            bookInfo.append(str(productStatus[<span class="number">0</span>].text))</span><br><span class="line"></span><br><span class="line">            productImg = book.findAll(<span class="string">'div'</span>, class_=<span class="string">'productImg-wrap'</span>)  <span class="comment"># 图片</span></span><br><span class="line">            <span class="keyword">try</span>:</span><br><span class="line">                productImg = productImg[<span class="number">0</span>].a.img[<span class="string">'src'</span>]</span><br><span class="line">            <span class="keyword">except</span>:</span><br><span class="line">                productImg = productImg[<span class="number">0</span>].a.img[<span class="string">'data-ks-lazyload'</span>]</span><br><span class="line">            bookInfo.append(<span class="string">'https:'</span> + str(productImg))</span><br><span class="line"></span><br><span class="line">            productShopName = book.findAll(<span class="string">'a'</span>, class_=<span class="string">'productShop-name'</span>)  <span class="comment"># 店名</span></span><br><span class="line">            bookInfo.append(str(productShopName[<span class="number">0</span>].text))</span><br><span class="line"></span><br><span class="line">            bookInfo.append(<span class="string">'天猫'</span>)</span><br><span class="line"></span><br><span class="line">            link = book.findAll(<span class="string">'a'</span>, class_=<span class="string">'productImg'</span>)  <span class="comment"># 物品详细界面</span></span><br><span class="line">            bookInfo.append(<span class="string">'https:'</span>+str(link[<span class="number">0</span>][<span class="string">'href'</span>]))</span><br><span class="line"></span><br><span class="line">            bookInfo.append(<span class="string">'2'</span>)</span><br><span class="line"></span><br><span class="line">            bookInfo.append(str(book[<span class="string">'data-id'</span>]))</span><br><span class="line"></span><br><span class="line">            allUnivList.append(bookInfo)</span><br><span class="line">            bookInfo=[]                     <span class="comment">#清空临时列表</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">tianmao</span><span class="params">(key,Limit)</span>:</span>   <span class="comment">#bug:当搜索不足10条时</span></span><br><span class="line">    allUnivList=[]</span><br><span class="line">    url = <span class="string">'&lt;https://list.tmall.com/search_product.htm?q='</span>+&gt; key</span><br><span class="line">    text = getHTMLText(url)</span><br><span class="line">    <span class="keyword">if</span> (text == <span class="string">""</span>): <span class="keyword">return</span> <span class="string">""</span>  <span class="comment"># 抓不到就返回空</span></span><br><span class="line">    getUnivList(allUnivList, text, Limit)</span><br><span class="line">    <span class="keyword">return</span> allUnivList</span><br></pre></td></tr></table></figure>



<h2 id="京东"><a href="#京东" class="headerlink" title="京东"></a>京东</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="keyword">import</span> bs4</span><br><span class="line"><span class="keyword">import</span> random</span><br><span class="line"><span class="keyword">import</span> json</span><br><span class="line"><span class="keyword">import</span> requests</span><br><span class="line"><span class="keyword">from</span> bs4 <span class="keyword">import</span> BeautifulSoup</span><br><span class="line"></span><br><span class="line">proxies = &#123;</span><br><span class="line">    <span class="string">'http'</span>:<span class="string">'&lt;http://117.135.153.10:80&gt;'</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">headers = &#123;<span class="string">'User-Agent'</span>: <span class="string">'Mozilla/5.0'</span>&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">getHTMLText</span><span class="params">(url)</span>:</span>   <span class="comment">#通用 获取网页信息</span></span><br><span class="line">    <span class="keyword">try</span>:</span><br><span class="line">        r = requests.get(url, headers=headers,proxies=proxies)   <span class="comment">#设置代理 设置时间</span></span><br><span class="line">        r.raise_for_status()</span><br><span class="line">        <span class="keyword">if</span>(url.find(<span class="string">'&lt;https://item.jd.com/&gt;'</span>)!=<span class="number">-1</span>):</span><br><span class="line">            r.encoding =<span class="string">'gbk'</span>;</span><br><span class="line">        <span class="keyword">else</span>:r.encoding =<span class="string">'utf-8'</span>;</span><br><span class="line">    <span class="keyword">except</span>:</span><br><span class="line">        print(<span class="string">"搜索失败"</span>)</span><br><span class="line">        <span class="keyword">return</span> <span class="string">""</span></span><br><span class="line">    <span class="keyword">return</span> r.text</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">getPrice</span><span class="params">(url)</span>:</span></span><br><span class="line">    <span class="keyword">try</span>:</span><br><span class="line">        r = requests.get(url, headers=headers)   <span class="comment">#设置代理 设置时间</span></span><br><span class="line">        r.raise_for_status()</span><br><span class="line">        r.encoding =<span class="string">'utf-8'</span>;</span><br><span class="line">        result=json.loads(r.text)</span><br><span class="line">        price=result[<span class="number">0</span>][<span class="string">'p'</span>]</span><br><span class="line">    <span class="keyword">except</span>:</span><br><span class="line">        print(<span class="string">"获取价格失败"</span>)</span><br><span class="line">        <span class="keyword">return</span> <span class="string">""</span></span><br><span class="line">    <span class="keyword">return</span> price</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">getHTMLText</span><span class="params">(url)</span>:</span>   <span class="comment">#通用 获取网页信息</span></span><br><span class="line">    <span class="keyword">try</span>:</span><br><span class="line">        r = requests.get(url, headers=headers,proxies=proxies)   <span class="comment">#设置代理 设置时间</span></span><br><span class="line">        r.raise_for_status()</span><br><span class="line">        <span class="keyword">if</span>(url.find(<span class="string">'&lt;https://item.jd.com/&gt;'</span>)!=<span class="number">-1</span>):</span><br><span class="line">            r.encoding =<span class="string">'gbk'</span>;</span><br><span class="line">        <span class="keyword">else</span>:r.encoding =<span class="string">'utf-8'</span>;</span><br><span class="line">    <span class="keyword">except</span>:</span><br><span class="line">        print(<span class="string">"搜索失败"</span>)</span><br><span class="line">        <span class="keyword">return</span> <span class="string">""</span></span><br><span class="line">    <span class="keyword">return</span> r.text</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">getPrice</span><span class="params">(url)</span>:</span></span><br><span class="line">    <span class="keyword">try</span>:</span><br><span class="line">        r = requests.get(url, headers=headers)   <span class="comment">#设置代理 设置时间</span></span><br><span class="line">        r.raise_for_status()</span><br><span class="line">        r.encoding =<span class="string">'utf-8'</span>;</span><br><span class="line">        result=json.loads(r.text)</span><br><span class="line">        price=result[<span class="number">0</span>][<span class="string">'p'</span>]</span><br><span class="line">    <span class="keyword">except</span>:</span><br><span class="line">        print(<span class="string">"获取价格失败"</span>)</span><br><span class="line">        <span class="keyword">return</span> <span class="string">""</span></span><br><span class="line">    <span class="keyword">return</span> price</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">getUnivList</span><span class="params">(allUnivList,text,Limit)</span>:</span></span><br><span class="line">    bookUrls = []</span><br><span class="line">    bookPriceURLs = []</span><br><span class="line">    bookInfo = []  <span class="comment"># 每件商品的信息 1价格  2  名字 3 评论数量 4 店名   5图片 6 平台 7物品详细界面</span></span><br><span class="line"></span><br><span class="line">    soup = BeautifulSoup(text, <span class="string">"html.parser"</span>)</span><br><span class="line">    bookIDs = soup.findAll(<span class="string">'li'</span>, &#123;<span class="string">'class'</span>: <span class="string">'gl-item'</span>&#125;, limit=Limit)  <span class="comment"># 获取书本ID</span></span><br><span class="line">    length = len(bookIDs)</span><br><span class="line">    <span class="keyword">if</span> (length == <span class="number">0</span>): <span class="keyword">return</span> <span class="string">""</span>    <span class="comment">#如果搜索为空就直接返回</span></span><br><span class="line">    commentNum = soup.findAll(<span class="string">'div'</span>, class_=<span class="string">'p-commit'</span>, limit=Limit)  <span class="comment"># 获取评论数量</span></span><br><span class="line">    img = soup.findAll(<span class="string">'div'</span>, class_=<span class="string">'p-img'</span>, limit=Limit)  <span class="comment"># 获取图片</span></span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> range(length):</span><br><span class="line">        bookUrls.append(<span class="string">'&lt;https://item.jd.com/&gt;'</span> + str(bookIDs[i].get(<span class="string">'data-sku'</span>)) + <span class="string">'.html'</span>)  <span class="comment"># 把商品的url加入数列</span></span><br><span class="line">        bookPriceURLs.append(<span class="string">'&lt;https://p.3.cn/prices/mgets?skuIds=J_&gt;'</span> + str(bookIDs[i].get(<span class="string">'data-sku'</span>)))  <span class="comment"># 把商品价格的url加入列表</span></span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> range(length):  <span class="comment"># bug ：获取的元素不存在时会出错 用#isinstance(div,bs4.element.Tag):  判断   没有就给个空字符串</span></span><br><span class="line">        text = getHTMLText(bookUrls[i])</span><br><span class="line">        <span class="keyword">if</span> (text == <span class="string">""</span>): <span class="keyword">return</span> <span class="string">""</span>  <span class="comment"># 抓不到就返回空</span></span><br><span class="line">        soup = BeautifulSoup(text, <span class="string">"html.parser"</span>)</span><br><span class="line"></span><br><span class="line">        bookInfo.append(getPrice(bookPriceURLs[i]))  <span class="comment"># 价格</span></span><br><span class="line"></span><br><span class="line">        name = soup.findAll(<span class="string">'div'</span>, class_=<span class="string">'sku-name'</span>, limit=<span class="number">1</span>)  <span class="comment"># 名字(限制22个字)</span></span><br><span class="line">        <span class="keyword">if</span>(len(name)):</span><br><span class="line">            <span class="keyword">if</span>(len(str(name[<span class="number">0</span>].text.strip()))&lt;=<span class="number">22</span>):</span><br><span class="line">                bookInfo.append(str(name[<span class="number">0</span>].text.strip()))</span><br><span class="line">            <span class="keyword">else</span>:</span><br><span class="line">                bookInfo.append(str(name[<span class="number">0</span>].text.strip())[<span class="number">0</span>:<span class="number">22</span>]+<span class="string">"..."</span>)</span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            bookInfo.append(<span class="string">''</span>)</span><br><span class="line"></span><br><span class="line">        bookInfo.append(str(commentNum[i].text.strip()))  <span class="comment"># 把评论数论数量加入列表</span></span><br><span class="line"></span><br><span class="line">        <span class="keyword">if</span> (str(img[i].img.get(<span class="string">'src'</span>)) == <span class="string">'None'</span>):</span><br><span class="line">            bookInfo.append(<span class="string">'http:'</span> + str(img[i].img.get(<span class="string">'source-data-lazy-img'</span>)))  <span class="comment"># 把图片加入列表</span></span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            bookInfo.append(<span class="string">'http:'</span> + str(img[i].img.get(<span class="string">'src'</span>)))  <span class="comment"># 把图片加入列表</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">        shopName = soup.findAll(<span class="string">'div'</span>, class_=<span class="string">'J-hove-wrap'</span>, limit=<span class="number">1</span>)  <span class="comment"># 店名</span></span><br><span class="line"></span><br><span class="line">        <span class="keyword">if</span> (len(shopName)):</span><br><span class="line">            shopName = shopName[<span class="number">0</span>].findAll(<span class="string">'a'</span>, limit=<span class="number">1</span>)  <span class="comment"># 在任何一个标签上都可以使用 findAll（）</span></span><br><span class="line">            <span class="keyword">if</span> (len(shopName)):</span><br><span class="line">                bookInfo.append(str(shopName[<span class="number">0</span>].text.strip()))</span><br><span class="line">            <span class="keyword">else</span>:</span><br><span class="line">                bookInfo.append(<span class="string">'京东自营'</span>)</span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            bookInfo.append(<span class="string">''</span>)</span><br><span class="line"></span><br><span class="line">        bookInfo.append(<span class="string">"京东"</span>)</span><br><span class="line">        bookInfo.append(bookUrls[i])</span><br><span class="line">        allUnivList.append(bookInfo)</span><br><span class="line">        bookInfo=[]</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">jingdong</span><span class="params">(key,allUnivList,Limit)</span>:</span>   <span class="comment">#bug:当搜索不足10条时</span></span><br><span class="line">    url = <span class="string">'&lt;https://search.jd.com/Search?keyword=&gt;'</span> + key + <span class="string">'&amp;enc=utf-8&amp;wq='</span> + key</span><br><span class="line">    text = getHTMLText(url)</span><br><span class="line">    <span class="keyword">if</span> (text == <span class="string">""</span>): <span class="keyword">return</span> <span class="string">""</span>  <span class="comment"># 抓不到就返回空</span></span><br><span class="line">    getUnivList(allUnivList, text, Limit)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">main</span><span class="params">()</span>:</span></span><br><span class="line">    key=<span class="string">""</span></span><br><span class="line">    Limit=<span class="number">10</span></span><br><span class="line">    allUnivList=[]</span><br><span class="line">    jingdong(key,allUnivList,<span class="number">20</span>)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">main()</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#r.request.headers 查看请求信息</span></span><br><span class="line"><span class="comment">#当获取元素的属性不存在时 返回一个 None</span></span><br><span class="line"><span class="comment">#isinstance(div,bs4.element.Tag):  判断一个标签的是否存在</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="string">'''from selenium import webdriver</span></span><br><span class="line"><span class="string">from selenium.webdriver.chrome.options import Options</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">chrome_options = Options()</span></span><br><span class="line"><span class="string">chrome_options.add_argument('--headless')</span></span><br><span class="line"><span class="string">driver = webdriver.Chrome(options=chrome_options)</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">driver.get("&lt;https://item.jd.com/12146215.html&gt;")</span></span><br><span class="line"><span class="string">element = driver.find_element_by_id("jd-price").text</span></span><br><span class="line"><span class="string">print (element)'''</span></span><br></pre></td></tr></table></figure>



<h2 id="当当"><a href="#当当" class="headerlink" title="当当"></a>当当</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="keyword">import</span> requests</span><br><span class="line"><span class="keyword">from</span> bs4 <span class="keyword">import</span> BeautifulSoup</span><br><span class="line"><span class="keyword">import</span> bs4</span><br><span class="line"></span><br><span class="line">proxies = &#123;</span><br><span class="line">    <span class="string">'http'</span>:<span class="string">'&lt;http://123.59.199.100:80&gt;'</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">headers = &#123;<span class="string">'User-Agent'</span>: <span class="string">'Mozilla/5.0'</span>&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">getHTMLText</span><span class="params">(url)</span>:</span>   <span class="comment">#通用 获取网页信息</span></span><br><span class="line">    <span class="keyword">try</span>:</span><br><span class="line">        r = requests.get(url, headers=headers,proxies=proxies)   <span class="comment">#设置代理 设置时间</span></span><br><span class="line">        r.raise_for_status()</span><br><span class="line">        r.encoding =<span class="string">'gbk'</span>;</span><br><span class="line">    <span class="keyword">except</span>:</span><br><span class="line">        print(<span class="string">"当当搜索失败"</span>)</span><br><span class="line">        <span class="keyword">return</span> <span class="string">""</span></span><br><span class="line">    <span class="keyword">return</span> r.text</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">getUnivList</span><span class="params">(allUnivList,text,Limit)</span>:</span></span><br><span class="line"></span><br><span class="line">    bookInfo = []  <span class="comment"># 每件商品的信息 0价格  1  名字 2 评论数量   3图片     4 店名   5 平台  6物品详细界面 7筛选  8商品ID</span></span><br><span class="line"></span><br><span class="line">    soup = BeautifulSoup(text, <span class="string">"html.parser"</span>)         <span class="comment">#直接获取每一条数据的全部信息</span></span><br><span class="line">    books = soup.findAll(<span class="string">'ul'</span>, class_=<span class="string">'bigimg'</span>,limit=<span class="number">1</span>)  <span class="comment"># 获取每一本的信息</span></span><br><span class="line">    books = books[<span class="number">0</span>].findAll(<span class="string">'li'</span>,limit=Limit)</span><br><span class="line">    length = len(books)</span><br><span class="line">    <span class="keyword">if</span> (length == <span class="number">0</span>): <span class="keyword">return</span> <span class="string">""</span>    <span class="comment">#如果搜索为空就直接返回</span></span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span> book <span class="keyword">in</span> books:</span><br><span class="line">        <span class="keyword">if</span> (isinstance(book, bs4.element.Tag)):</span><br><span class="line">            productPrice = book.findAll(<span class="string">'span'</span>, class_=<span class="string">'search_now_price'</span>) <span class="comment">#价格</span></span><br><span class="line">            bookInfo.append(str(productPrice[<span class="number">0</span>].text))</span><br><span class="line"></span><br><span class="line">            productTitle = book.findAll(<span class="string">'p'</span>, class_=<span class="string">'name'</span>)  <span class="comment"># 名字</span></span><br><span class="line">            <span class="keyword">if</span> (len(productTitle)):</span><br><span class="line">                <span class="keyword">if</span> (len(str(productTitle[<span class="number">0</span>].text.strip())) &lt;= <span class="number">22</span>):</span><br><span class="line">                    bookInfo.append(str(productTitle[<span class="number">0</span>].text.strip()))</span><br><span class="line">                <span class="keyword">else</span>:</span><br><span class="line">                    bookInfo.append(str(productTitle[<span class="number">0</span>].text.strip())[<span class="number">0</span>:<span class="number">22</span>] + <span class="string">"..."</span>)</span><br><span class="line">            <span class="keyword">else</span>:</span><br><span class="line">                bookInfo.append(<span class="string">''</span>)</span><br><span class="line"></span><br><span class="line">            productStatus = book.findAll(<span class="string">'p'</span>, class_=<span class="string">'search_star_line'</span>)  <span class="comment"># 评价</span></span><br><span class="line">            bookInfo.append(str(productStatus[<span class="number">0</span>].text))</span><br><span class="line"></span><br><span class="line">            productImg = book.findAll(<span class="string">'a'</span>, class_=<span class="string">'pic'</span>)  <span class="comment"># 图片</span></span><br><span class="line">            link=productImg[<span class="number">0</span>][<span class="string">'href'</span>]                      <span class="comment">#获取物品详细界面</span></span><br><span class="line">            <span class="keyword">try</span>:</span><br><span class="line">                productImg = productImg[<span class="number">0</span>].img[<span class="string">'data-original'</span>]</span><br><span class="line">            <span class="keyword">except</span>:</span><br><span class="line">                productImg = productImg[<span class="number">0</span>].img[<span class="string">'src'</span>]</span><br><span class="line">            bookInfo.append(str(productImg))</span><br><span class="line"></span><br><span class="line">            productShopName = book.findAll(<span class="string">'p'</span>, class_=<span class="string">'search_shangjia'</span>)  <span class="comment"># 店名   分自营和商家   限制22个字</span></span><br><span class="line">            <span class="keyword">if</span> (len(productShopName)):</span><br><span class="line">                productShopName = productShopName[<span class="number">0</span>].find(<span class="string">'a'</span>)[<span class="string">'title'</span>]</span><br><span class="line">                bookInfo.append(productShopName)</span><br><span class="line">            <span class="keyword">else</span>:</span><br><span class="line">                bookInfo.append(<span class="string">'当当自营'</span>)</span><br><span class="line"></span><br><span class="line">            bookInfo.append(<span class="string">'当当'</span>)</span><br><span class="line"></span><br><span class="line">            bookInfo.append(link)</span><br><span class="line"></span><br><span class="line">            bookInfo.append(<span class="string">'3'</span>)</span><br><span class="line"></span><br><span class="line">            bookInfo.append(book[<span class="string">'id'</span>][<span class="number">1</span>:])</span><br><span class="line"></span><br><span class="line">            allUnivList.append(bookInfo)</span><br><span class="line">            bookInfo = []</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">dangdang</span><span class="params">(key,Limit)</span>:</span>   <span class="comment">#bug:当搜索不足10条时</span></span><br><span class="line">    allUnivList=[]</span><br><span class="line">    url = <span class="string">'&lt;http://search.dangdang.com/?key='</span>+key+<span class="string">'&amp;act=input&gt;'</span></span><br><span class="line">    text = getHTMLText(url)</span><br><span class="line">    <span class="keyword">if</span> (text == <span class="string">""</span>): <span class="keyword">return</span> <span class="string">""</span>  <span class="comment"># 抓不到就返回空</span></span><br><span class="line">    getUnivList(allUnivList, text, Limit)</span><br><span class="line">    print(allUnivList)</span><br><span class="line">    <span class="keyword">return</span> allUnivList</span><br></pre></td></tr></table></figure>

<h2 id="孔夫子"><a href="#孔夫子" class="headerlink" title="孔夫子"></a>孔夫子</h2><figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="keyword">import</span> requests</span><br><span class="line"><span class="keyword">import</span> json</span><br><span class="line">proxies = &#123;</span><br><span class="line">&#125;</span><br><span class="line">headers = &#123;<span class="string">'User-Agent'</span>: <span class="string">'Mozilla/5.0'</span>&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">getHTMLText</span><span class="params">(url)</span>:</span>   <span class="comment">#通用 获取网页信息</span></span><br><span class="line">    <span class="keyword">try</span>:</span><br><span class="line">        r = requests.get(url, headers=headers,proxies=proxies)   <span class="comment">#设置代理 设置时间</span></span><br><span class="line">        r.raise_for_status()</span><br><span class="line">        r.encoding =<span class="string">'utf-8'</span>;</span><br><span class="line">    <span class="keyword">except</span>:</span><br><span class="line">        print(<span class="string">"孔夫子搜索失败"</span>)</span><br><span class="line">        <span class="keyword">return</span> <span class="string">""</span></span><br><span class="line">    <span class="keyword">return</span> r.text</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">getFee</span><span class="params">(userId,itemId)</span>:</span></span><br><span class="line">    url=<span class="string">'&lt;http://shop.kongfz.com/book/shopsearch/getShippingFee?callback=jQuery11120008516125003493968_1545017785216&amp;params=&#123;%22params%22:[&#123;%22userId%22:%22'</span>+userId+<span class="string">'%22,%22itemId%22:%22'</span>+itemId+<span class="string">'%22&#125;&gt;],%22area%22:%221006000000%22&#125;'</span></span><br><span class="line">    text=getHTMLText(url)</span><br><span class="line">    <span class="keyword">if</span> (text == <span class="string">""</span>): <span class="keyword">return</span> <span class="string">"邮费获取失败"</span>  <span class="comment"># 抓不到就返回空</span></span><br><span class="line">    text=text.replace(<span class="string">'jQuery11120008516125003493968_1545017785216('</span>,<span class="string">''</span>).replace(<span class="string">')'</span>,<span class="string">''</span>)</span><br><span class="line">    feeAll = json.loads(text)</span><br><span class="line">    fee=<span class="string">'快递:'</span>+feeAll[<span class="string">'data'</span>][<span class="number">0</span>][<span class="string">'fee'</span>][<span class="number">0</span>][<span class="string">'totalFee'</span>]</span><br><span class="line">    <span class="keyword">return</span> fee</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">getUnivList</span><span class="params">(allUnivList,text,Limit)</span>:</span></span><br><span class="line">    bookdetail = json.loads(text)</span><br><span class="line">    bookInfo = []  <span class="comment"># 每件商品的信息 0价格  1  名字 2 评论数量(邮费)   3图片     4 店名   5 平台(商品的品数)  6物品详细界面 7筛选  8商品ID</span></span><br><span class="line"></span><br><span class="line">    books=bookdetail[<span class="string">'data'</span>][<span class="string">'itemList'</span>]</span><br><span class="line">    lenth=len(books)</span><br><span class="line">    <span class="keyword">if</span> lenth==<span class="number">0</span>:</span><br><span class="line">        <span class="keyword">return</span> <span class="string">""</span></span><br><span class="line">    <span class="keyword">if</span>(lenth&gt;Limit):</span><br><span class="line">        lenth=Limit;</span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> range(lenth):</span><br><span class="line">        bookInfo.append(float(books[i][<span class="string">'price'</span>]))</span><br><span class="line">        bookInfo.append(str(books[i][<span class="string">'itemname_snippet'</span>]).replace(<span class="string">'&lt;b&gt;'</span>,<span class="string">''</span>).replace(<span class="string">'&lt;/b&gt;'</span>,<span class="string">''</span>))</span><br><span class="line">        bookInfo.append(getFee(str(books[i][<span class="string">'userid'</span>]),str(books[i][<span class="string">'itemid'</span>])))  <span class="comment">#传入用户ID与商品ID去获得邮费</span></span><br><span class="line">        <span class="keyword">if</span> str((books[i][<span class="string">'imgurl'</span>]))==<span class="string">""</span>:</span><br><span class="line">            bookInfo.append(<span class="string">""</span>)</span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            bookInfo.append(<span class="string">'&lt;http://www.kfzimg.com/'</span>+str((books[i][<span class="string">'imgurl&gt;'</span>])))</span><br><span class="line">        bookInfo.append(str(books[i][<span class="string">'shopname'</span>])[<span class="number">0</span>:<span class="number">15</span>])</span><br><span class="line">        bookInfo.append(str(books[i][<span class="string">'qualityname'</span>]))</span><br><span class="line">        bookInfo.append(<span class="string">'&lt;http://book.kongfz.com/'</span>+str(books[i][<span class="string">'shopid'</span>])+<span class="string">'/'</span>+str(books[i][<span class="string">'itemid'</span>])+<span class="string">'/&gt;'</span>)</span><br><span class="line">        bookInfo.append(<span class="string">'1'</span>)</span><br><span class="line">        allUnivList.append(bookInfo)</span><br><span class="line">        bookInfo=[]</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">kongfuzi</span><span class="params">(key,Limit)</span>:</span>   <span class="comment">#bug:当搜索不足10条时</span></span><br><span class="line">    allUnivList=[]</span><br><span class="line">    url = <span class="string">'&lt;http://search.kongfz.com/product_result/?key='</span>+key+<span class="string">'&amp;exact=1&amp;type=1&amp;ajaxdata=1&gt;'</span></span><br><span class="line">    text = getHTMLText(url)</span><br><span class="line">    <span class="keyword">if</span> (text == <span class="string">""</span>): <span class="keyword">return</span> <span class="string">""</span>  <span class="comment"># 抓不到就返回空</span></span><br><span class="line">    getUnivList(allUnivList, text, Limit)</span><br><span class="line">    print(allUnivList)</span><br><span class="line">    <span class="keyword">return</span> allUnivList</span><br><span class="line"></span><br><span class="line">kongfuzi(<span class="string">"三体"</span>,<span class="number">10</span>)</span><br></pre></td></tr></table></figure>
