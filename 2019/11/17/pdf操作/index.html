                    <p><a href="https://s3-us-west-2.amazonaws.com/secure.notion-static.com/ac4eaf12-c6b7-46d0-bc8f-9b2aa8d9674f/pdfminer-docs.pdf" target="_blank" rel="noopener">pdfminer-docs.pdf</a></p>
<p>在pdf中找到想找的关键字，并且将找到的页面合并成为一个新的pdf</p>
<a id="more"></a>

<figure class="highlight python"><table><tr><td class="code"><pre><span class="line"><span class="string">'''</span></span><br><span class="line"><span class="string">1 拿到文件并且pdfminer解析</span></span><br><span class="line"><span class="string">2 遍历每一页，碰到关键字就退出，记录关键所在的位置，页面（上中下三个）</span></span><br><span class="line"><span class="string">3 去重记录信息 把相应的页面截取并重组</span></span><br><span class="line"><span class="string">'''</span></span><br><span class="line"><span class="keyword">from</span> pdfminer.pdfinterp <span class="keyword">import</span> PDFResourceManager, PDFPageInterpreter</span><br><span class="line"><span class="keyword">from</span> pdfminer.converter <span class="keyword">import</span> PDFPageAggregator</span><br><span class="line"><span class="keyword">from</span> pdfminer.layout <span class="keyword">import</span> LTTextBoxHorizontal,LAParams</span><br><span class="line"><span class="keyword">from</span> pdfminer.pdfpage <span class="keyword">import</span> PDFPage</span><br><span class="line"><span class="keyword">from</span> PyPDF2 <span class="keyword">import</span> PdfFileReader, PdfFileWriter</span><br><span class="line"><span class="keyword">import</span> re</span><br><span class="line"><span class="keyword">import</span> logging</span><br><span class="line">logging.Logger.propagate = <span class="literal">False</span></span><br><span class="line">logging.getLogger().setLevel(logging.ERROR)   <span class="comment">#消除警告信息</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">Input</span><span class="params">()</span>:</span></span><br><span class="line">    path=input(<span class="string">"请输入PDF文件路径:"</span>)</span><br><span class="line">    path = path+<span class="string">".pdf"</span></span><br><span class="line">    keyword=input(<span class="string">"请输入要搜索的关键字:"</span>)</span><br><span class="line">    output_path = input(<span class="string">"请输入合并文件需要存放的路径:"</span>)</span><br><span class="line">    output_path = output_path+<span class="string">".pdf"</span></span><br><span class="line">    <span class="keyword">return</span> path, keyword,output_path</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">PDF</span><span class="params">(path,keyword)</span>:</span>        <span class="comment">#输入：文档路径 关键字 输出：关键字所在的页面</span></span><br><span class="line">    info=[]</span><br><span class="line">    pdfFileReader = PdfFileReader(path)            <span class="comment">#如果文档加密了就会出错</span></span><br><span class="line">    numPages = pdfFileReader.getNumPages()</span><br><span class="line"></span><br><span class="line">    document = open(path, <span class="string">'rb'</span>)</span><br><span class="line">    rsrcmgr = PDFResourceManager()  <span class="comment"># 创建PDf 资源管理器 来管理共享资源</span></span><br><span class="line">		<span class="comment">#创建一个PDF设备对象</span></span><br><span class="line">    laparams = LAParams()   </span><br><span class="line">    device = PDFPageAggregator(rsrcmgr, laparams=laparams)</span><br><span class="line">		<span class="comment"># 创建一个PDF解释器对象</span></span><br><span class="line">    interpreter = PDFPageInterpreter(rsrcmgr, device)</span><br><span class="line"></span><br><span class="line">    page_count = <span class="number">0</span></span><br><span class="line">    <span class="keyword">for</span> page <span class="keyword">in</span> PDFPage.get_pages(document):</span><br><span class="line">        page_count = page_count + <span class="number">1</span></span><br><span class="line">        interpreter.process_page(page)</span><br><span class="line">        layout = device.get_result()</span><br><span class="line">        <span class="keyword">for</span> element <span class="keyword">in</span> layout:</span><br><span class="line">            <span class="keyword">if</span> isinstance(element, LTTextBoxHorizontal):</span><br><span class="line">                bulk=element.get_text().strip()</span><br><span class="line">                match=re.search(keyword,str(bulk),flags=<span class="number">0</span>)</span><br><span class="line">                <span class="keyword">if</span> match:</span><br><span class="line">                    <span class="comment">#if page_count!=1:             #如果匹配  就将前后页面和当前页面保存</span></span><br><span class="line">                        <span class="comment">#info.append(page_count-1)</span></span><br><span class="line">                    info.append(page_count)</span><br><span class="line">                    <span class="comment">#if page_count!=numPages:</span></span><br><span class="line">                        <span class="comment">#info.append(page_count+1)</span></span><br><span class="line">                    <span class="keyword">break</span>;</span><br><span class="line">    info=list(set(info))     <span class="comment">#截取上中下界面可能会有页面重合，需要去重</span></span><br><span class="line">    info.sort()</span><br><span class="line">    <span class="keyword">return</span> info</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">merge</span><span class="params">(path,page_index,output_path)</span>:</span>    <span class="comment">#输入：文件路径，需要合并的页面，输出路径</span></span><br><span class="line">    pdfFileWriter = PdfFileWriter()</span><br><span class="line">    <span class="comment"># 获取 PdfFileReader 对象</span></span><br><span class="line">    pdfFileReader = PdfFileReader(path)  <span class="comment"># 或者这个方式：pdfFileReader = PdfFileReader(open(readFile, 'rb'))</span></span><br><span class="line">    <span class="comment"># 获取 PDF 文件的文档信息</span></span><br><span class="line">    <span class="keyword">if</span> len(page_index):</span><br><span class="line">        <span class="keyword">for</span> index <span class="keyword">in</span> page_index:      <span class="comment">#注意：序号是从零开始</span></span><br><span class="line">            pageObj = pdfFileReader.getPage(index<span class="number">-1</span>)  <span class="comment"># 获取某一个页面</span></span><br><span class="line">            pdfFileWriter.addPage(pageObj)</span><br><span class="line">        pdfFileWriter.write(open(output_path, <span class="string">'wb'</span>))  <span class="comment"># 添加完每页，再一起保存至文件中</span></span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        print(<span class="string">"页数为空"</span>)</span><br><span class="line">    print(<span class="string">"完成"</span>)</span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> __name__ == <span class="string">"__main__"</span>:</span><br><span class="line">    path,keyword,output_path=Input()</span><br><span class="line">    page_index=PDF(path,keyword)</span><br><span class="line">    merge(path,page_index,output_path)</span><br></pre></td></tr></table></figure>
